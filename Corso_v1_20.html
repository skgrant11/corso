const whoLabel = (item, travelers) => {
  const known = travelers.filter(t=>ADULTS.includes(t)||KIDS_T.includes(t));
  const adults = known.filter(t=>ADULTS.includes(t));
  const kids   = known.filter(t=>KIDS_T.includes(t));
  const total  = known.length;
  if(total===0) return null;

  let who;
  if(item.who==="all")         who = known;
  else if(item.who==="adults") who = adults;
  else if(item.who==="kids")   who = kids;
  else if(WHO_NAMED[item.who]) who = known.filter(WHO_NAMED[item.who]);
  else who = known;

  if(!who||!who.length) return null;

  if(item.perPerson){
    if(who.length===total && total>1) return "per person";
    if(who.length===1) return who[0];
    return who.join(" & ");
  } else {
    if(who.length===total && total>1) return "every traveler";
    if(who.length===1) return who[0];
    return who.join(" & ");
  }
};

const fmtT = (iso,h24) => { if(!iso) return ""; const d=new Date(iso); return h24?d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false}):d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}); };

// Convert file to Base64 — this is the key fix for persistent photos
const fileToB64 = file => new Promise((res,rej) => {
  // Resize to max 1200px wide before encoding to keep storage reasonable
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    const MAX = 1200;
    let w=img.width, h=img.height;
    if(w>MAX){ h=Math.round(h*(MAX/w)); w=MAX; }
    const canvas = document.createElement("canvas");
    canvas.width=w; canvas.height=h;
    canvas.getContext("2d").drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    res(canvas.toDataURL("image/jpeg",0.82));
  };
  img.onerror = rej;
  img.src = url;
});

// ══ PLAN (top-level — stable reference, no remount on App re-render) ══════════
function PlanPage({ctx}) {
  const {trip,upTrip,T,IS,SS,TS,BN,BS,BG,CD,LB,H1,H2,G2,AB,go,busy,aiResp,callAI,TRAVELERS,DISNEY_SHIPS,tripLabel,fmtD,dark} = ctx;
  T.pill=ctx.pill; T.pillc=ctx.pillc; T.fnt=ctx.fnt; T.sub=T.sub||ctx.sub;
  const dest = trip.dest;
  if(!dest) return <div style={{color:T.sub,padding:"40px 0",textAlign:"center"}}>Please select a destination in Discover first.</div>;
  const td = trip.td;

  const togTrav = name => {
    const c=td.travelers, n=c.includes(name)?c.filter(x=>x!==name):[...c,name];
    upTrip({td:{...td,travelers:n}});
  };

  // ALL inputs are fully uncontrolled (refs only) — no state, no re-renders while typing.
  // This prevents the "first tap closes keyboard" glitch caused by upTrip triggering a re-render.
  const tripNameRef = React.useRef(null);
  const startRef    = React.useRef(null);
  const endRef      = React.useRef(null);
  const notesRef    = React.useRef(null);
  const outFlightRef= React.useRef(null);
  const retFlightRef= React.useRef(null);
  const lodgingRef  = React.useRef(null);
  const transportRef= React.useRef(null);
  const otherRef    = React.useRef(null);

  // Flush a single field to global state on blur — no local state needed
  const flush = (k, v) => {
    if(k==="tripName"){ upTrip({tripName:v}); return; }
    if(["startDate","endDate","disneyShip","notes"].includes(k)){ upTrip({td:{...trip.td,[k]:v}}); return; }
    upTrip({td:{...trip.td,spec:{...trip.td.spec,[k]:v}}});
  };

  // Generate name from destination + departure date in DOM
  const genTripName = () => {
    const destShort = dest.name.split(",")[0].trim();
    const sd = startRef.current?._val || startRef.current?.value || td.startDate || "";
    if(sd){
      const d = new Date(sd + "T12:00:00");
      const mon = d.toLocaleString("en-US",{month:"long"});
      const yr  = d.getFullYear();
      return `${destShort} ${mon} ${yr}`;
    }
    return destShort;
  };

  const showBanner = trip.tripName;

  return (
    <div>
      {showBanner&&(
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"18px",padding:"10px 14px",background:ctx.dark?"#1a3a50":"#fffbf0",border:`1px solid ${T.gold}44`,borderRadius:"8px"}}>
          <span style={{fontSize:"18px"}}>{dest?.img||"🧭"}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.gold}}>{trip.tripName}</div>
            {dest&&<div style={{fontSize:"11px",color:T.sub}}>{dest.name}{td.startDate?` · ${fmtD(td.startDate)}`:""}{td.disneyShip?` · ${td.disneyShip}`:""}</div>}
          </div>
          {td.travelers.length>0&&<div style={{display:"flex",gap:"3px",flexWrap:"wrap",justifyContent:"flex-end"}}>
            {td.travelers.map(v=><span key={v} style={{fontSize:"10px",padding:"2px 7px",background:T.pill,color:T.pillc,borderRadius:"100px",fontWeight:600}}>{v}</span>)}
          </div>}
        </div>
      )}
      <h1 style={H1}>Plan Your Corso</h1>
      <p style={H2}>{dest.name}</p>

      {/* Trip Name — fully uncontrolled */}
      <div style={CD}>
        <div style={{fontSize:"9px",letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:600,color:T.coral,marginBottom:"11px"}}>Name Your Corso</div>
        <div style={{display:"flex",gap:"8px",alignItems:"flex-end"}}>
          <div style={{flex:1}}><label style={LB}>Trip Name</label>
            <input style={IS}
              ref={tripNameRef}
              placeholder={`e.g. ${dest.name.split(",")[0]} June 2025`}
              defaultValue={trip.tripName||""}
              onBlur={e=>flush("tripName",e.target.value)}/>
          </div>
          <button style={{...BS,marginBottom:"1px",whiteSpace:"nowrap"}} onClick={()=>{
            const n=genTripName();
            if(tripNameRef.current) tripNameRef.current.value=n;
            upTrip({tripName:n});
          }}>✦ Generate</button>
        </div>
        {trip.tripName&&<div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"13px",color:T.gold,marginTop:"8px"}}>{trip.tripName}</div>}
      </div>

      {/* Dates — fully uncontrolled */}
      <div style={{...G2,marginBottom:"11px"}}>
        <div><label style={LB}>Departure Date</label>
          <input type="date" style={IS}
            ref={startRef}
            defaultValue={td.startDate||""}
            onChange={e=>{ startRef.current._val=e.target.value; }}
            onBlur={e=>{ const v=e.target.value||startRef.current?._val||""; flush("startDate",v); }}/>
        </div>
        <div><label style={LB}>Return Date</label>
          <input type="date" style={IS}
            ref={endRef}
            defaultValue={td.endDate||""}
            onChange={e=>{ endRef.current._val=e.target.value; }}
            onBlur={e=>{ const v=e.target.value||endRef.current?._val||""; flush("endDate",v); }}/>
        </div>
      </div>

      {dest.isDisney&&<div style={{marginBottom:"11px"}}>
        <label style={LB}>Which Disney Ship?</label>
        <select style={SS} defaultValue={td.disneyShip||""}
          onChange={e=>flush("disneyShip",e.target.value)}>
          <option value="">Select a ship…</option>
          {DISNEY_SHIPS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>}

      {/* Travelers */}
      <div style={{marginBottom:"11px"}}>
        <label style={LB}>Who's Going?</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
          {TRAVELERS.map(name=>{const sel=td.travelers.includes(name);return(
            <button key={name} onClick={()=>togTrav(name)}
              style={{padding:"7px 14px",borderRadius:"100px",cursor:"pointer",fontSize:"13px",fontWeight:500,
                background:sel?T.ocn:T.inp,color:sel?"#fff":T.sub,border:`1.5px solid ${sel?T.ocn:T.bdr}`,
                WebkitTapHighlightColor:"transparent"}}>
              {sel?"✓ "+name:name}
            </button>
          );})}
        </div>
        {td.travelers.length>0&&<div style={{marginTop:"8px",fontSize:"12px",color:T.sub}}>Going: <strong style={{color:T.tx}}>{td.travelers.join(", ")}</strong></div>}
      </div>

      {/* Travel Specifics — all fully uncontrolled */}
      <div style={CD}>
        <div style={{fontSize:"9px",letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:600,color:T.coral,marginBottom:"11px"}}>
          Travel Specifics <span style={{fontWeight:400,color:T.fnt,letterSpacing:"0.06em"}}>(optional)</span>
        </div>
        <div style={{...G2,marginBottom:"9px"}}>
          <div><label style={LB}>Outbound Flight</label>
            <input style={IS} ref={outFlightRef} placeholder="AA 1234 · 8:00 AM"
              defaultValue={td.spec?.outFlight||""}
              onBlur={e=>flush("outFlight",e.target.value)}/>
          </div>
          <div><label style={LB}>Return Flight</label>
            <input style={IS} ref={retFlightRef} placeholder="AA 5678 · 3:30 PM"
              defaultValue={td.spec?.retFlight||""}
              onBlur={e=>flush("retFlight",e.target.value)}/>
          </div>
        </div>
        <div style={{marginBottom:"9px"}}><label style={LB}>Lodging / Resort / Cabin</label>
          <input style={IS} ref={lodgingRef} placeholder="Hotel · Room, or Ship · Stateroom"
            defaultValue={td.spec?.lodging||""}
            onBlur={e=>flush("lodging",e.target.value)}/>
        </div>
        <div style={{marginBottom:"9px"}}><label style={LB}>Ground Transport / Car Rental</label>
          <input style={IS} ref={transportRef} placeholder="Rental car, Uber from port, shuttle…"
            defaultValue={td.spec?.transport||""}
            onBlur={e=>flush("transport",e.target.value)}/>
        </div>
        <div><label style={LB}>Other Notes</label>
          <input style={IS} ref={otherRef} placeholder="Visa requirements, travel insurance, reservations…"
            defaultValue={td.spec?.other||""}
            onBlur={e=>flush("other",e.target.value)}/>
        </div>
      </div>

      {/* Must-Dos — fully uncontrolled */}
      <div style={{marginBottom:"13px"}}><label style={LB}>Must-Do's & Notes</label>
        <textarea style={TS} ref={notesRef} placeholder="Things you definitely want to experience…"
          defaultValue={td.notes||""}
          onBlur={e=>flush("notes",e.target.value)}/>
      </div>

      {/* AI buttons — read directly from DOM refs so latest text is always used */}
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"13px"}}>
        <button style={BS} onClick={()=>{
          const cur=trip.td;
          // Also pull any un-flushed values directly from refs
          const sd=startRef.current?._val||startRef.current?.value||cur.startDate||"";
          const ed=endRef.current?._val||endRef.current?.value||cur.endDate||"";
          const days=sd&&ed?Math.ceil((new Date(ed)-new Date(sd))/86400000):"several";
          const who=cur.travelers.length?`Traveling party: ${cur.travelers.join(", ")}.`:"Sarah, Rene, Roman, and Samantha.";
          const ship=dest.isDisney&&cur.disneyShip?`Disney ship: ${cur.disneyShip}.`:"";
          const out=outFlightRef.current?.value||cur.spec?.outFlight||"";
          const ret=retFlightRef.current?.value||cur.spec?.retFlight||"";
          const lod=lodgingRef.current?.value||cur.spec?.lodging||"";
          const tra=transportRef.current?.value||cur.spec?.transport||"";
          const oth=otherRef.current?.value||cur.spec?.other||"";
          const notes=notesRef.current?.value||cur.notes||"";
          const spStr=[out?`Outbound: ${out}`:"",ret?`Return: ${ret}`:"",lod?`Lodging: ${lod}`:"",tra?`Transport: ${tra}`:"",oth?`Other: ${oth}`:""].filter(Boolean).join(". ");
          callAI(`Create a detailed day-by-day itinerary for ${days} days in ${dest.name}. ${who} ${ship} ${spStr?`Travel details: ${spStr}.`:""} ${notes?`Must-do: ${notes}.`:""} Format each day with Morning, Afternoon, Evening. Include travel specifics on Day 1 and final day.`);
        }}>◈ Generate Itinerary</button>
        <button style={BS} onClick={()=>callAI(`Top 5 local restaurants and must-try dishes in ${dest.name}. Brief description of each.`)}>◈ Restaurant Guide</button>
        <button style={BN} onClick={()=>go("pack")}>Build Pack List →</button>
      </div>
      {busy&&<div style={{...AB,color:T.gold}}>Building your plan…</div>}
      {aiResp&&<div style={AB}><div style={{fontSize:"9px",color:T.gold,letterSpacing:"0.15em",marginBottom:"8px",fontWeight:600}}>◈ AI PLAN</div><div style={{whiteSpace:"pre-line"}}>{aiResp}</div></div>}
    </div>
  );
}

// ══ JOURNAL (top-level — stable reference) ════════════════════════════════════
function JournalPage({ctx}) {
  const {trip,upTrip,T,IS,TS,BN,BS,BG,CD,LB,H1,H2,go,sidebar,setSidebar,setViewId,setLightbox,handlePhotos,setTrips,tripLabel,todayStr,todayShort,fmtD} = ctx;

  // ── Trip length — how many days the trip spans ────────────────────────────
  const tripDays = React.useMemo(()=>{
    const {startDate,endDate} = trip.td;
    if(startDate&&endDate){
      const diff = Math.round((new Date(endDate+"T12:00:00")-new Date(startDate+"T12:00:00"))/(1000*60*60*24));
      return diff>0 ? diff+1 : null; // inclusive (Apr 7–Apr 11 = 5 days)
    }
    return null;
  },[trip.td.startDate,trip.td.endDate]);

  // ── Default ISO date for current journal day ──────────────────────────────
  const defaultDateForDay = React.useCallback((dayNum)=>{
    if(trip.td.startDate){
      const base = new Date(trip.td.startDate+"T12:00:00");
      base.setDate(base.getDate()+(dayNum-1));
      return base.toISOString().slice(0,10);
    }
    return new Date().toISOString().slice(0,10);
  },[trip.td.startDate]);

  // ── Uncontrolled refs for journal text — ZERO re-renders while typing ──────
  const goodRef      = React.useRef(null);
  const badRef       = React.useRef(null);
  const highlightRef = React.useRef(null);
  const jFileRef     = React.useRef();
  const editFileRef  = React.useRef();

  // ── Editable entry date — defaults to trip day date ───────────────────────
  const [entryDate, setEntryDate] = React.useState(()=>defaultDateForDay(trip.journalDay));
  const dateRef = React.useRef(null);

  // Keep entryDate in sync when journalDay changes (after save/skip)
  React.useEffect(()=>{
    const d = defaultDateForDay(trip.journalDay);
    setEntryDate(d);
    if(dateRef.current){ dateRef.current.value=d; dateRef.current._val=d; }
  },[trip.journalDay, defaultDateForDay]);

  // ── Edit state for previous entries ────────────────────────────────────────
  const [editIdx,setEditIdx]     = React.useState(null);
  const [editDraft,setEditDraft] = React.useState({good:"",bad:"",highlight:""});
  const setED = (k,v) => setEditDraft(d=>({...d,[k]:v}));

  const clearForm = () => {
    if(goodRef.current)      goodRef.current.value      = "";
    if(badRef.current)       badRef.current.value       = "";
    if(highlightRef.current) highlightRef.current.value = "";
  };

  const openEdit = (i) => {
    const e = trip.journal[i];
    setEditDraft({good:e.good||"",bad:e.bad||"",highlight:e.highlight||""});
    setEditIdx(i);
  };
  const closeEdit = () => setEditIdx(null);
  const saveEdit  = (i) => {
    upTrip({journal:trip.journal.map((e,idx)=>idx===i?{...e,...editDraft}:e)});
    setEditIdx(null);
  };

  const deleteEntry = (i) => {
    if(!window.confirm("Clear this entry? It will be replaced with a skipped day you can edit.")) return;
    const entry      = trip.journal[i];
    const removedIds = new Set(entry.photoIds||[]);
    const otherRefs  = new Set(trip.journal.filter((_,idx)=>idx!==i).flatMap(e=>e.photoIds||[]));
    const toDelete   = [...removedIds].filter(id=>!otherRefs.has(id));
    const updated    = trip.journal.map((e,idx)=>idx===i
      ? {day:e.day, date:e.date, good:"", bad:"", highlight:"", skipped:true, photoIds:[]}
      : e
    );
    upTrip({journal:updated, photos:trip.photos.filter(p=>!toDelete.includes(p.id))});
    if(editIdx===i) setEditIdx(null);
  };

  const deletePhoto = (entryIdx, photoId) => {
    upTrip({
      journal: trip.journal.map((e,i)=>i===entryIdx?{...e,photoIds:(e.photoIds||[]).filter(id=>id!==photoId)}:e),
      photos:  trip.photos.filter(p=>p.id!==photoId),
    });
  };

  const fmtEntryDate = (iso) => {
    if(!iso) return todayStr();
    const d = new Date(iso+"T12:00:00");
    return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  };

  const dateStr = () => new Date((entryDate||defaultDateForDay(trip.journalDay))+"T12:00:00")
    .toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

  // ── Trip complete? ────────────────────────────────────────────────────────
  const journalComplete = tripDays!==null && trip.journalDay > tripDays;

  // ── TRIP COMPLETE SCREEN ──────────────────────────────────────────────────
  if(journalComplete) return (
    <div>
      {trip.tripName&&(
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"18px",padding:"10px 14px",background:ctx.dark?"#1a3a50":"#fffbf0",border:`1px solid ${T.gold}44`,borderRadius:"8px"}}>
          <span style={{fontSize:"18px"}}>{trip.dest?.img||"🧭"}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.gold}}>{trip.tripName}</div>
            {trip.dest&&<div style={{fontSize:"11px",color:T.sub}}>{trip.dest.name}{trip.td.startDate?` · ${fmtD(trip.td.startDate)}`:""}</div>}
          </div>
        </div>
      )}
      <h1 style={H1}>Logbook</h1>
      <p style={{fontSize:"11px",color:T.sub,letterSpacing:"0.14em",marginBottom:"24px",textTransform:"uppercase",fontWeight:500}}>{tripLabel}</p>
      <div style={{textAlign:"center",padding:"32px 0 20px"}}>
        <div style={{fontSize:"48px",marginBottom:"16px"}}>✈️</div>
        <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"22px",color:T.gold,marginBottom:"10px"}}>
          {tripDays}-day journey complete
        </div>
        <div style={{fontSize:"14px",color:T.sub,marginBottom:"28px",lineHeight:"1.7"}}>
          All {tripDays} days journaled.{trip.journal.length>0?` You captured ${trip.journal.filter(e=>e.good||e.highlight).length} memories.`:""}
        </div>
        <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
          <button style={BN} onClick={()=>go("memoir")}>★ Write Your Memoir →</button>
          <button style={BS} onClick={()=>{
            const nt = mkTrip();
            ctx.setTrips(ts=>[...ts,nt]); ctx.setAid(nt.id); go("discover");
          }}>✦ Plan Your Next Corso</button>
        </div>
      </div>
      {/* Still show previous entries so they can be reviewed/edited */}
      {trip.journal.length>0&&(
        <div style={{marginTop:"12px"}}>
          <div style={LB}>All Entries — {tripLabel}</div>
          {trip.journal.map((e,i)=>{
            const entryPhotos=(e.photoIds||[]).map(pid=>trip.photos.find(p=>p.id===pid)).filter(Boolean);
            const isEditing=editIdx===i;
            return (
              <div key={i} style={{...CD,cursor:"default",borderColor:isEditing?T.gold:T.bdr}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                  <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"12px",color:T.gold}}>
                    Day {e.day} · {e.date}{e.skipped?" — Skipped":""}
                  </div>
                  <div style={{display:"flex",gap:"5px"}}>
                    {!isEditing&&<button style={{...BG,padding:"3px 9px",fontSize:"9px"}} onClick={()=>openEdit(i)}>✏️ Edit</button>}
                    <button style={{...BG,padding:"3px 9px",fontSize:"9px",color:"#e05555",borderColor:"#e0555544"}} onClick={()=>deleteEntry(i)}>🗑 Delete</button>
                  </div>
                </div>
                {isEditing?(
                  <div>
                    {[{k:"good",ic:"✦",lb:"Good memory",cl:T.ocn},{k:"bad",ic:"◦",lb:"Challenge",cl:"#e05555"},{k:"highlight",ic:"★",lb:"Highlight",cl:T.gold}].map(({k,ic,lb,cl})=>(
                      <div key={k} style={{marginBottom:"10px"}}>
                        <label style={{...LB,color:cl,marginBottom:"4px"}}>{ic} {lb}</label>
                        <textarea style={{...TS,minHeight:"54px",borderColor:cl+"44"}} value={editDraft[k]} onChange={ev=>setED(k,ev.target.value)}/>
                      </div>
                    ))}
                    <div style={{display:"flex",gap:"8px"}}>
                      <button style={BN} onClick={()=>saveEdit(i)}>Save Changes</button>
                      <button style={BG} onClick={closeEdit}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <div>
                    {e.skipped&&!e.good&&!e.bad&&!e.highlight?<div style={{fontSize:"13px",color:T.fnt,fontStyle:"italic"}}>Day skipped — tap Edit to add notes.</div>:(
                      <div>
                        {e.good&&<div style={{fontSize:"13px",color:T.tx,marginBottom:"4px"}}><span style={{color:T.ocn}}>✦</span> {e.good}</div>}
                        {e.bad&&<div style={{fontSize:"13px",color:T.tx,marginBottom:"4px"}}><span style={{color:"#e05555"}}>◦</span> {e.bad}</div>}
                        {e.highlight&&<div style={{fontSize:"13px",color:T.tx,marginBottom:"8px"}}><span style={{color:T.gold}}>★</span> {e.highlight}</div>}
                      </div>
                    )}
                    {entryPhotos.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:"5px",marginTop:"8px"}}>
                      {entryPhotos.map((p,pi)=><img key={pi} src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"6px",cursor:"pointer",border:`1px solid ${T.bdr}`}} alt="" onClick={()=>setLightbox(p)}/>)}
                    </div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  // ── ACTIVE JOURNAL FORM ───────────────────────────────────────────────────
  return (
    <div>
      {trip.tripName&&(
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"18px",padding:"10px 14px",background:ctx.dark?"#1a3a50":"#fffbf0",border:`1px solid ${T.gold}44`,borderRadius:"8px"}}>
          <span style={{fontSize:"18px"}}>{trip.dest?.img||"🧭"}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.gold}}>{trip.tripName}</div>
            {trip.dest&&<div style={{fontSize:"11px",color:T.sub}}>{trip.dest.name}{trip.td.startDate?` · ${fmtD(trip.td.startDate)}`:""}{trip.td.disneyShip?` · ${trip.td.disneyShip}`:""}</div>}
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px"}}>
        <h1 style={{...H1,marginBottom:0}}>Logbook</h1>
        <button style={BS} onClick={()=>{setSidebar(v=>!v);setViewId(null);}}>{sidebar?"Close ✕":"All Corsos ↗"}</button>
      </div>
      <p style={{fontSize:"11px",color:T.sub,letterSpacing:"0.14em",marginBottom:"20px",textTransform:"uppercase",fontWeight:500}}>{tripLabel}</p>

      {/* Progress bar if trip has defined length */}
      {tripDays&&(
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>
          <div style={{flex:1,background:T.bdr,borderRadius:"4px",height:"5px"}}>
            <div style={{background:T.coral,height:"5px",borderRadius:"4px",width:`${Math.min(((trip.journalDay-1)/tripDays)*100,100)}%`,transition:"width 0.4s"}}/>
          </div>
          <span style={{fontSize:"11px",color:T.sub,whiteSpace:"nowrap"}}>Day {trip.journalDay} of {tripDays}</span>
        </div>
      )}

      {/* ── NEW ENTRY FORM ── */}
      <div style={CD}>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"17px",flexWrap:"wrap"}}>
          <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"15px",color:T.gold,flex:1}}>
            Day {trip.journalDay} — {fmtEntryDate(entryDate)}
          </div>
          <input type="date" style={{...IS,width:"auto",fontSize:"12px",padding:"5px 9px"}}
            defaultValue={entryDate}
            ref={dateRef}
            onChange={e=>{ dateRef.current._val=e.target.value; }}
            onBlur={e=>{ const v=e.target.value||dateRef.current._val||entryDate; setEntryDate(v); }}/>
        </div>

        {[{r:goodRef,ic:"✦",lb:"A good memory from today",ph:"Something wonderful that happened…",cl:T.ocn},
          {r:badRef,ic:"◦",lb:"Something to remember (challenge)",ph:"What didn't go as planned…",cl:"#e05555"},
          {r:highlightRef,ic:"★",lb:"The highlight of the day",ph:"If you had to pick one unforgettable moment…",cl:T.gold}
        ].map(({r,ic,lb,ph,cl})=>(
          <div key={lb} style={{marginBottom:"14px"}}>
            <label style={{...LB,color:cl}}>{ic} {lb}</label>
            <textarea ref={r} style={{...TS,borderColor:cl+"44"}} placeholder={ph} defaultValue=""/>
          </div>
        ))}

        <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
          <button style={BN} onClick={()=>{
            const good=goodRef.current?.value||"",bad=badRef.current?.value||"",highlight=highlightRef.current?.value||"";
            if(!good&&!bad&&!highlight) return;
            const dayNum=trip.journalDay;
            upTrip({journal:[...trip.journal,{day:dayNum,date:dateStr(),good,bad,highlight,photoIds:[]}],journalDay:trip.journalDay+1});
            clearForm();
          }}>Save Day {trip.journalDay}</button>

          <button style={BS} onClick={()=>{
            const dayNum=trip.journalDay;
            upTrip({journal:[...trip.journal,{day:dayNum,date:dateStr(),good:"",bad:"",highlight:"",skipped:true,photoIds:[]}],journalDay:trip.journalDay+1});
            clearForm();
          }}>Skip Day {trip.journalDay}</button>

          <label style={{...BG,display:"inline-block",cursor:"pointer",padding:"8px 14px"}}>
            📷 Photos
            <input type="file" accept="image/*" multiple style={{display:"none"}} ref={jFileRef}
              onChange={async e=>{
                const files=Array.from(e.target.files); if(!files.length) return;
                const dayNum=trip.journalDay;
                const ids=await handlePhotos(files,dayNum);
                setTrips(ts=>ts.map(t=>{
                  if(t.id!==trip.id) return t;
                  const jCopy=[...t.journal];
                  const idx=jCopy.findLastIndex(en=>en.day===dayNum);
                  if(idx>=0) jCopy[idx]={...jCopy[idx],photoIds:[...(jCopy[idx].photoIds||[]),...ids]};
                  return {...t,journal:jCopy};
                }));
                e.target.value="";
              }}/>
          </label>
          <span style={{fontSize:"11px",color:T.fnt}}>{trip.photos.length} photo{trip.photos.length!==1?"s":""} stored</span>
        </div>
      </div>

      {/* ── PREVIOUS ENTRIES ── */}
      {trip.journal.length>0&&(
        <div style={{marginBottom:"17px"}}>
          <div style={LB}>Previous Entries — {tripLabel}</div>

                              <button onClick={()=>deletePhoto(i,p.id)} style={{position:"absolute",top:"2px",right:"2px",background:"rgba(220,60,60,0.85)",border:"none",borderRadius:"50%",width:"18px",height:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:"#fff",lineHeight:1}}>✕</button>

// ══ ARCHIVE JOURNAL (top-level — edit/delete journal entries from any trip) ═══
function ArchiveJournal({viewing,T,CD,LB,IS,TS,BN,BS,BG,setLightbox,setTrips,handlePhotos,fmtD}) {
  const [editIdx,setEditIdx]   = React.useState(null);
  const [editDraft,setEditDraft] = React.useState({good:"",bad:"",highlight:""});
  const editFileRef = React.useRef();
  const setED=(k,v)=>setEditDraft(d=>({...d,[k]:v}));

  const openEdit=(i)=>{ const e=viewing.journal[i]; setEditDraft({good:e.good||"",bad:e.bad||"",highlight:e.highlight||""}); setEditIdx(i); };
  const closeEdit=()=>setEditIdx(null);

  const saveEdit=(i)=>{
    setTrips(ts=>ts.map(t=>{
      if(t.id!==viewing.id) return t;
      return {...t,journal:t.journal.map((e,idx)=>idx===i?{...e,...editDraft}:e)};
    }));
    setEditIdx(null);
  };

  const deleteEntry=(i)=>{
    if(!window.confirm("Clear this entry? It will be replaced with a skipped day you can edit.")) return;
    const entry=viewing.journal[i];
    const removedIds=new Set(entry.photoIds||[]);
    const otherRefs=new Set(viewing.journal.filter((_,idx)=>idx!==i).flatMap(e=>e.photoIds||[]));
    const toDelete=[...removedIds].filter(id=>!otherRefs.has(id));
    setTrips(ts=>ts.map(t=>{
      if(t.id!==viewing.id) return t;
      return {
        ...t,
        journal:t.journal.map((e,idx)=>idx===i?{day:e.day,date:e.date,good:"",bad:"",highlight:"",skipped:true,photoIds:[]}:e),
        photos:t.photos.filter(p=>!toDelete.includes(p.id)),
      };
    }));
    if(editIdx===i) setEditIdx(null);
  };

  const deletePhoto=(entryIdx,photoId)=>{
    setTrips(ts=>ts.map(t=>{
      if(t.id!==viewing.id) return t;
      return {
        ...t,
        journal:t.journal.map((e,i)=>i===entryIdx?{...e,photoIds:(e.photoIds||[]).filter(id=>id!==photoId)}:e),
        photos:t.photos.filter(p=>p.id!==photoId),
      };
    }));
  };

  if(!viewing.journal.length) return <div style={{textAlign:"center",padding:"48px",color:T.sub}}>No journal entries yet.</div>;

  return (
    <div>
      {viewing.journal.map((e,i)=>{
        const ePhotos=(e.photoIds||[]).map(pid=>viewing.photos.find(p=>p.id===pid)).filter(Boolean);
        const isEditing=editIdx===i;
        return (
          <div key={i} style={{...CD,cursor:"default",marginBottom:"14px",borderColor:isEditing?T.gold:T.bdr}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
              <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"13px",color:T.gold}}>
                Day {e.day} · {e.date}{e.skipped?" — Skipped":""}
              </div>
              <div style={{display:"flex",gap:"5px"}}>
                {!isEditing&&<button style={{...BG,padding:"3px 9px",fontSize:"9px"}} onClick={()=>openEdit(i)}>✏️ Edit</button>}
                <button style={{...BG,padding:"3px 9px",fontSize:"9px",color:"#e05555",borderColor:"#e0555544"}} onClick={()=>deleteEntry(i)}>🗑 Delete</button>
              </div>
            </div>
            {isEditing?(
              <div>
                {e.skipped&&<div style={{fontSize:"11px",color:T.sub,marginBottom:"10px",fontStyle:"italic"}}>This day was skipped — add notes below to update it.</div>}
                {[{k:"good",ic:"✦",lb:"Good memory",cl:T.ocn},{k:"bad",ic:"◦",lb:"Challenge",cl:"#e05555"},{k:"highlight",ic:"★",lb:"Highlight",cl:T.gold}].map(({k,ic,lb,cl})=>(
                  <div key={k} style={{marginBottom:"10px"}}>
                    <label style={{...LB,color:cl,marginBottom:"4px"}}>{ic} {lb}</label>
                    <textarea style={{...TS,minHeight:"54px",borderColor:cl+"44"}} value={editDraft[k]} onChange={ev=>setED(k,ev.target.value)}/>
                  </div>
                ))}
                <div style={{marginBottom:"12px"}}>
                  <label style={{...LB,marginBottom:"6px"}}>Photos ({ePhotos.length})</label>
                  {ePhotos.length>0&&(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(72px,1fr))",gap:"5px",marginBottom:"8px"}}>
                      {ePhotos.map((p,pi)=>(
                        <div key={pi} style={{position:"relative"}}>
                          <img src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"6px",border:`1px solid ${T.bdr}`,display:"block"}} alt="" onClick={()=>setLightbox(p)}/>
                          <button onClick={()=>deletePhoto(i,p.id)} style={{position:"absolute",top:"2px",right:"2px",background:"rgba(220,60,60,0.85)",border:"none",borderRadius:"50%",width:"18px",height:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:"#fff",lineHeight:1}}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                  <label style={{...BG,display:"inline-block",cursor:"pointer",padding:"5px 10px",fontSize:"10px"}}>
                    + Add Photos
                    <input type="file" accept="image/*" multiple style={{display:"none"}} ref={editFileRef}
                      onChange={async ev=>{
                        const files=Array.from(ev.target.files); if(!files.length) return;
                        const newPhotos=[];
                        for(const f of files){
                          try{
                            const img2=new Image(); const url=URL.createObjectURL(f);
                            const b64=await new Promise((res,rej)=>{img2.onload=()=>{const MAX=1200;let w=img2.width,h=img2.height;if(w>MAX){h=Math.round(h*(MAX/w));w=MAX;}const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img2,0,0,w,h);URL.revokeObjectURL(url);res(cv.toDataURL("image/jpeg",0.82));};img2.onerror=rej;img2.src=url;});
                            newPhotos.push({id:Math.random().toString(36).slice(2,10),b64,caption:"",dayRef:e.day,dateAdded:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})});
                          }catch(err){console.warn(err);}
                        }
                        if(!newPhotos.length) return;
                        setTrips(ts=>ts.map(t=>{
                          if(t.id!==viewing.id) return t;
                          const jCopy=[...t.journal];
                          jCopy[i]={...jCopy[i],photoIds:[...(jCopy[i].photoIds||[]),...newPhotos.map(p=>p.id)]};
                          return {...t,journal:jCopy,photos:[...t.photos,...newPhotos]};
                        }));
                        ev.target.value="";
                      }}/>
                  </label>
                </div>
                <div style={{display:"flex",gap:"8px"}}>
                  <button style={BN} onClick={()=>saveEdit(i)}>Save Changes</button>
                  <button style={BG} onClick={closeEdit}>Cancel</button>
                </div>
              </div>
            ):(
              <div>
                {e.skipped&&!e.good&&!e.bad&&!e.highlight?<div style={{fontSize:"13px",color:T.fnt,fontStyle:"italic"}}>Day skipped — tap Edit to add notes.</div>:(
                  <div>
                    {e.good&&<div style={{fontSize:"14px",color:T.tx,marginBottom:"6px"}}><span style={{color:T.ocn}}>✦</span> {e.good}</div>}
                    {e.bad&&<div style={{fontSize:"14px",color:T.tx,marginBottom:"6px"}}><span style={{color:"#e05555"}}>◦</span> {e.bad}</div>}
                    {e.highlight&&<div style={{fontSize:"14px",color:T.tx,marginBottom:"10px"}}><span style={{color:T.gold}}>★</span> {e.highlight}</div>}
                  </div>
                )}
                {ePhotos.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:"5px",marginTop:"6px"}}>
                  {ePhotos.map((p,pi)=><img key={pi} src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"6px",cursor:"pointer",border:`1px solid ${T.bdr}`}} alt="" onClick={()=>setLightbox(p)}/>)}
                </div>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ══ MAIN APP ══════════════════════════════════════════════════════════════════
function App() {
  const [trips,setTrips]     = useState([mkTrip()]);
  const [aid,setAid]         = useState(null);
  const [aiResp,setAiResp]   = useState(null);
  const [busy,setBusy]       = useState(false);
  const [dark,setDark]       = useState(false);
  const [h24,setH24]         = useState(true);
  const [ph,setPh]           = useState("discover");
  const [saveSt,setSaveSt]   = useState("idle");
  const [lastSav,setLastSav] = useState(null);
  const [sidebar,setSidebar] = useState(false);
  const [viewId,setViewId]   = useState(null);
  // album state
  const [albumTrip,setAlbumTrip]   = useState(null);  // which trip's album is open
  const [lightbox,setLightbox]     = useState(null);  // {b64,caption,dayRef}
  const [albumView,setAlbumView]   = useState("grid"); // grid | journal | memoir
  const [mobileSettings,setMobileSettings] = useState(false);
  const [defaultItems,setDefaultItems] = useState([]); // [{name,who,perPerson,section,quantity}]
  const fileRef=useRef(), impRef=useRef(), saveT=useRef(null);

  const trip = trips.find(t=>t.id===aid)||trips[0];
  const upTrip = useCallback(p=>setTrips(ts=>ts.map(t=>t.id===trip.id?{...t,...p}:t)),[trip?.id]);

  // ── PERSISTENCE ──────────────────────────────────────────────────────────────
  useEffect(()=>{
    try {
      const r=localStorage.getItem(SK); if(!r) return;
      const s=JSON.parse(r);
      if(s.trips?.length) setTrips(s.trips);
      if(s.aid) setAid(s.aid);
      if(s.ph) setPh(s.ph);
      if(s.dark!==undefined) setDark(s.dark);
      if(s.h24!==undefined) setH24(s.h24);
      if(s.lastSav) setLastSav(s.lastSav);
      if(s.defaultItems) setDefaultItems(s.defaultItems);
    } catch(e) { console.warn("Corso load error:",e); }
  },[]);

  const doSave = useCallback((tr,a,p,dk,_h24,_def)=>{
    setSaveSt("saving"); clearTimeout(saveT.current);
    saveT.current = setTimeout(()=>{
      try {
        const ts=new Date().toISOString();
        localStorage.setItem(SK,JSON.stringify({trips:tr,aid:a,ph:p,dark:dk,h24:_h24,lastSav:ts,defaultItems:_def}));
        setLastSav(ts); setSaveSt("saved"); setTimeout(()=>setSaveSt("idle"),2500);
      } catch(e) {
        setSaveSt("idle");
        if(e.name==="QuotaExceededError") alert("Storage full — your photos may be taking up too much space. Try exporting a backup and removing some photos.");
      }
    },1500);
  },[]);

  useEffect(()=>{ doSave(trips,aid,ph,dark,h24,defaultItems); },[trips,aid,ph,dark,h24,defaultItems]);

  // ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
  const doExport = () => {
    const blob = new Blob([JSON.stringify({trips,aid,ph,dark,h24,exportedAt:new Date().toISOString(),version:4},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`corso-${new Date().toISOString().slice(0,10)}.json`; a.click();
  };
  const doImport = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        if(d.trips?.length){
          setTrips(d.trips); setAid(d.aid||d.trips[0].id);
          if(d.ph) setPh(d.ph);
          if(d.dark!==undefined) setDark(d.dark);
          if(d.h24!==undefined) setH24(d.h24);
        }
      } catch { alert("Invalid Corso backup file."); }
    };
    r.readAsText(f); e.target.value="";
  };

  const go = p => { setPh(p); setAiResp(null); setSidebar(false); };
  // Reset Plan/Pack/Journal/Memoir when user picks a new destination
  const resetForNewDest = (dest) => {
    upTrip({
      dest,
      tripName:"",
      td:{startDate:"",endDate:"",travelers:[],notes:"",disneyShip:"",spec:{outFlight:"",retFlight:"",lodging:"",transport:"",other:""}},
      packChecked:{},
      packMeta:{swimDays:null,swimType:"none",formalNights:0,carryOnOnly:false,celebrating:"none",themePark:"none",smartDone:false},
      packFilter:[],
      customItems:[],
      journal:[],
      photos:[],
      journalDay:1,
      rating:null,
      memoirHistory:[],
    });
  };

  // ── PACK HELPERS ─────────────────────────────────────────────────────────────
  // If no named travelers are selected, default to the full family of 4
  const _selectedKnown = trip.td.travelers.filter(t=>ADULTS.includes(t)||KIDS_T.includes(t));
  const knownTravelers = _selectedKnown.length > 0 ? _selectedKnown : ["Sarah","Rene","Roman","Samantha"];
  const hasKids   = knownTravelers.some(t=>KIDS_T.includes(t));
  const hasAdults = knownTravelers.some(t=>ADULTS.includes(t));
  const meta   = trip.packMeta||{};
  const dest   = trip.dest;
  const isBeachTrip = dest && (dest.type.includes("Beach") || dest.isDisney);
  const isTropical  = dest && (dest.climate==="tropical"||dest.region==="Caribbean"||dest.isDisney||dest.type.includes("Beach"));
  const isCruise    = dest && dest.isDisney;
  const isOrlando   = dest && (dest.isOrlando || dest.name==="Orlando, FL");
  // Disney park: Orlando dest OR smart pack says disney park
  const isDisneyPark = isOrlando && (meta.themePark==="disney"||meta.themePark==="both");

  // buildAllPackItems(scope) → ordered { catName: [itemObj,...] }
  const buildAllPackItems = (scope=null) => {
    if(!dest) return {};
    const sc = scope||knownTravelers;
    const cats = {};
    const seen = new Set(); // dedup by item name

    const addCat = (label, items) => {
      const filtered = items.filter(i=>{
        if(!itemApplies(i,sc)) return false;
        if(seen.has(i.name)) return false; // dedup
        seen.add(i.name);
        return true;
      });
      if(filtered.length) cats[label] = [...(cats[label]||[]), ...filtered];
    };

    // ── Always ───────────────────────────────────────────────────────────────
    cats["Every Corso"] = [];
    addCat("Every Corso", PACK.Always);
    if(hasKids) addCat("Every Corso", ALWAYS_EXTRA);

    // ── Within Reach (second section always) ─────────────────────────────────
    addCat("Within Reach", CARRY_ON_ITEMS);

    // ── Destination-specific categories ──────────────────────────────────────
    if(dest.isDisney){
      addCat("Disney Cruise Essentials", DISNEY_PACK);
      addCat("Beach", PACK.Beach); // waterproof phone case already deduped
    } else {
      if(dest.type.includes("Beach"))     addCat("Beach",     PACK.Beach);
      if(dest.type.includes("City"))      addCat("City",      PACK.City);
      if(dest.type.includes("Theme Park"))addCat("Theme Park",PACK.ThemePark);
      if(dest.type.includes("Adventure")) addCat("Adventure", PACK.Adventure);
      if(dest.type.includes("Culture"))   addCat("Culture",   PACK.Culture);
    }

    // ── Disney Park items (Orlando or smart pack theme park = disney/both) ────
    if(isDisneyPark){
      addCat("Theme Park", DISNEY_PARK_ITEMS);
    }

    // ── The Wardrobe (Clothing + Shoes combined) ──────────────────────────────
    const nights = trip.td.startDate&&trip.td.endDate
      ? Math.round((new Date(trip.td.endDate+"T12:00:00")-new Date(trip.td.startDate+"T12:00:00"))/(1000*60*60*24))
      : null;
    const wardrobeItems = [];

    // Clothing first
    if(nights){
      const casualCount = Math.min(nights,10)+2;
      wardrobeItems.push({name:`Casual outfits (${casualCount} per person — ${Math.min(nights,10)} days + 2 backup)`,who:"all",perPerson:true});
    } else {
      wardrobeItems.push({name:"Casual outfits (1 per day + 2 backup)",who:"all",perPerson:true});
    }

    // Swimsuits
    if(meta.swimType==="multi"&&meta.swimDays){
      const sc2=Math.min(Math.max(Math.ceil(meta.swimDays/2),2),4);
      wardrobeItems.push({name:`Swimsuit ×${sc2} per person (1 per 2 swim days)`,who:"all",perPerson:true});
    } else if(meta.swimType==="once"){
      wardrobeItems.push({name:"Swimsuit ×2 per person",who:"all",perPerson:true});
    } else if(isBeachTrip&&!meta.swimType){
      wardrobeItems.push({name:"Swimsuit(s)",who:"all",perPerson:true});
    }

    // Cover-up
    if(isBeachTrip||meta.swimType==="multi"||meta.swimType==="once"){
      wardrobeItems.push({name:"Cover-up",who:"adults",perPerson:true});
    }

    // Formal/nice dinner outfits
    if(meta.formalNights>0){
      wardrobeItems.push({name:`Nice/formal dinner outfit ×${meta.formalNights} per person`,who:"all",perPerson:true});
    }

    // Shoes after clothing
    wardrobeItems.push(...SHOES_ALWAYS);
    const needsSwimShoes = isBeachTrip || meta.swimType==="multi" || meta.swimType==="once";
    if(needsSwimShoes) wardrobeItems.push({name:"Water shoes",who:"all",perPerson:true},{name:"Sandals / flip flops",who:"all",perPerson:true});

    if(wardrobeItems.length) addCat("The Wardrobe", wardrobeItems);

    // ── Personal always-on items ───────────────────────────────────────────────
    addCat("The Vanity", PERSONAL_ALWAYS.filter(i=>itemApplies(i,sc)));

    // ── Medications ──────────────────────────────────────────────────────────
    const medItems = [];
    medItems.push({name:`First Aid (${MEDS_FIRST_AID.join(", ")})`,who:"all",perPerson:false});
    if(itemApplies(MED_PRESCRIPTION,sc)) medItems.push(MED_PRESCRIPTION);
    if(hasAdults&&itemApplies({who:"adults"},sc)){
      const al=[...MEDS_ADULT_BASE,...(isCruise?MEDS_ADULT_CRUISE:[])];
      medItems.push({name:`Adult Meds (${al.join(", ")})`,who:"adults",perPerson:false});
    }
    if(hasKids&&itemApplies({who:"kids"},sc)){
      const kl=[...MEDS_KIDS_BASE,...(isCruise?MEDS_KIDS_CRUISE:[])];
      medItems.push({name:`Kids Meds (${kl.join(", ")})`,who:"kids",perPerson:false});
    }
    // Beach/tropical: everyone sunscreen + aloe + kids sunscreen
    if(isTropical){
      const beachEssAll = [...MEDS_BEACH_ADULT];

        <div style={{fontSize:"9px",letterSpacing:"0.25em",textTransform:"uppercase",fontWeight:600,color:T.coral,marginBottom:"22px"}}>How Corso Works</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"12px"}}>
          {[["🧭","Discover","Browse destinations"],["📋","Plan","Dates & details"],["🎒","Pack","Smart list + print"],["✍️","Logbook","Daily memories"],["🗺️","Voyages","Your journey archive"],["⭐","Memoir","Rate & memoir"]].map(([ic,p,ds])=>(
            <div key={p} style={{textAlign:"center"}}>
              <div style={{fontSize:"22px",marginBottom:"7px"}}>{ic}</div>
              <div style={{fontFamily:"'Spectral',serif",fontSize:"12px",color:dark?T.tx:T.dep,marginBottom:"4px"}}>{p}</div>
              <div style={{fontSize:"10px",color:T.sub,lineHeight:"1.5"}}>{ds}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // ══ DISCOVER ═════════════════════════════════════════════════════════════════
  const Discover = () => {
    const rl=Object.keys(REGIONS), cl=trip.filters.region!=="Any Region"?REGIONS[trip.filters.region]:[];
    return (
      <div className="fade-in">
        <Banner/>
        <h1 style={H1}>Set your course.</h1>
        <p style={H2}>Find your perfect destination</p>
        <div style={{...G2,marginBottom:"10px"}}>
          <div><label style={LB}>Region</label>
            <select style={SS} value={trip.filters.region} onChange={e=>upTrip({filters:{...trip.filters,region:e.target.value,country:""}})}>
              {rl.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <div><label style={LB}>{trip.filters.region==="United States"?"State":"Country / Destination"}</label>
            <select style={{...SS,opacity:cl.length?1:0.5}} value={trip.filters.country} disabled={cl.length===0} onChange={e=>upTrip({filters:{...trip.filters,country:e.target.value}})}>
              <option value="">{cl.length===0?"(Select a region first)":"All"}</option>
              {cl.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{...G3,marginBottom:"20px"}}>
          {[{k:"budget",l:"Budget",o:["any","low","medium","high"]},{k:"climate",l:"Climate",o:["any","tropical","temperate","mediterranean","arid"]},{k:"type",l:"Experience",o:["any","Beach","City","Culture","Adventure","Family","Cruise"]}].map(({k,l,o})=>(
            <div key={k}><label style={LB}>{l}</label>
              <select style={SS} value={trip.filters[k]} onChange={e=>upTrip({filters:{...trip.filters,[k]:e.target.value}})}>
                {o.map(v=><option key={v} value={v}>{v.charAt(0).toUpperCase()+v.slice(1)}</option>)}
              </select>
            </div>
          ))}
        </div>
        <div style={G2}>
          {filtDests.length ? filtDests.map(d=>(
            <div key={d.id} style={{...CC,...(trip.dest?.id===d.id?{background:dark?"#1a3a50":"#fffbf0",border:`1.5px solid ${T.gold}`,boxShadow:`0 2px 14px ${T.gold}22`}:{})}} onClick={()=>upTrip({dest:d})}>
              <div style={{display:"flex",alignItems:"center",gap:"13px",marginBottom:"10px"}}>
                <span style={{fontSize:"30px"}}>{d.img}</span>
                <div>
                  <div style={{fontFamily:"'Spectral',serif",fontSize:"16px",color:dark?T.tx:T.dep,marginBottom:"2px"}}>{d.name}</div>
                  <div style={{fontSize:"11px",color:T.sub}}>{d.type} · {d.dur}</div>
                </div>
              </div>
              <div style={{marginBottom:"7px"}}>
                <span style={TG(T.gold)}>{d.budget} cost</span>
                {d.climate!=="any"&&<span style={TG(T.ocn)}>{d.climate}</span>}
                <span style={TG(T.sub)}>{d.region}</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                {d.hl.map(h=><span key={h} style={{fontSize:"10px",color:T.sub,padding:"2px 7px",background:T.bg2,borderRadius:"100px"}}>{h}</span>)}
              </div>
            </div>
          )) : <div style={{gridColumn:"1/-1",textAlign:"center",padding:"44px",color:T.sub}}>No destinations match — try broadening your filters.</div>}
        </div>
        {trip.dest&&(
          <div>
            <div style={DV}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px"}}>
              <div>
                <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"15px",color:T.gold,marginBottom:"3px"}}>Selected: {trip.dest.name}</div>
                <div style={{fontSize:"12px",color:T.sub}}>Ready to plan your corso?</div>
              </div>
              <div style={{display:"flex",gap:"8px"}}>
                <button style={BS} onClick={()=>callAI(`I'm planning a trip to ${trip.dest.name}. Give me 5 compelling reasons to visit and 3 honest downsides in 2 concise paragraphs.`)}>✦ AI Insights</button>
                <button style={BN} onClick={()=>{resetForNewDest(trip.dest);go("plan");}}>Plan This Corso →</button>
              </div>
            </div>
            {busy&&<div style={{...AB,color:T.gold}}>Gathering insights…</div>}
            {aiResp&&<div style={AB}><div style={{fontSize:"9px",color:T.gold,letterSpacing:"0.15em",marginBottom:"8px",fontWeight:600}}>✦ AI INSIGHTS</div>{aiResp}</div>}
          </div>
        )}
      </div>
    );
  };

  // ══ PLAN — rendered as top-level PlanPage, see above App ══════════════════════
  const Plan = () => <PlanPage ctx={{trip,upTrip,T,IS,SS,TS,BN,BS,BG,CD,LB,H1,H2,G2,AB,go,busy,aiResp,callAI,dark,handlePhotos,setTrips,tripLabel,TRAVELERS,DISNEY_SHIPS,fmtD,pill:T.pill,pillc:T.pillc,sub:T.sub,fnt:T.fnt}}/>;

  // ══ PACK ═════════════════════════════════════════════════════════════════════
  const Pack = () => {
    const cats  = filteredPackItems;
    const nights = trip.td.startDate&&trip.td.endDate
      ? Math.round((new Date(trip.td.endDate+"T12:00:00")-new Date(trip.td.startDate+"T12:00:00"))/(1000*60*60*24))
      : null;

    // ── Smart Pack Setup state ─────────────────────────────────────────────
    const m = trip.packMeta||{};
    const [smartOpen, setSmartOpen]   = React.useState(!m.smartDone);
    const [swimType,  setSwimType]    = React.useState(m.swimType||"none");
    const [swimDays,  setSwimDays]    = React.useState(m.swimDays||"");
    const [formalN,   setFormalN]     = React.useState(m.formalNights||0);
    const [carryOn,   setCarryOn]     = React.useState(m.carryOnOnly||false);
    const [celebrating, setCelebrating] = React.useState(m.celebrating||"none");
    const [themePark,   setThemePark]   = React.useState(m.themePark||"none");

    const saveSmartMeta = () => {
      upTrip({packMeta:{
        swimType, swimDays:swimType==="multi"?parseInt(swimDays)||2:null,
        formalNights:parseInt(formalN)||0, carryOnOnly:carryOn,
        celebrating, themePark, smartDone:true,
      }});
      setSmartOpen(false);
    };

    // ── Traveler filter ────────────────────────────────────────────────────
    const toggleFilter = (name) => {
      const cur = trip.packFilter||[];
      if(cur.length===0){ upTrip({packFilter:[name]}); }
      else if(cur.includes(name)){ upTrip({packFilter:cur.filter(n=>n!==name)}); }
      else { upTrip({packFilter:[...cur,name]}); }
    };
    const isAllSelected = packFilter.length===0;

    // ── Add custom item state ──────────────────────────────────────────────
    const [showAddItem,  setShowAddItem]  = React.useState(false);
    const [ciName,       setCiName]       = React.useState("");
    const [ciWho,        setCiWho]        = React.useState("all");
    const [ciQty,        setCiQty]        = React.useState(1);
    const [ciSection,    setCiSection]    = React.useState("auto");
    const [ciSaveDefault,setCiSaveDefault]= React.useState(false);
    const [ciPerPerson,  setCiPerPerson]  = React.useState(true);

    const allSections = ["Always","Clothing","Shoes","Medications","Beach","City","Adventure","Culture","Disney Cruise Essentials","Kids","Travel Documents","Miscellaneous"];

    const addCustomItem = () => {
      if(!ciName.trim()) return;
      const section = ciSection==="auto" ? guessSection(ciName) : ciSection;
      const qty     = parseInt(ciQty)||1;
      const nameWithQty = qty>1 ? `${ciName} ×${qty}` : ciName;
      const item = {name:nameWithQty, who:ciWho, perPerson:ciPerPerson, section, custom:true};
      // Add to trip
      upTrip({customItems:[...(trip.customItems||[]), item]});
      // Optionally save to defaults
      if(ciSaveDefault){
        setDefaultItems(prev=>[...prev, item]);
      }
      // Reset form
      setCiName(""); setCiWho("all"); setCiQty(1); setCiSection("auto"); setCiSaveDefault(false); setCiPerPerson(true);
      setShowAddItem(false);
    };

    return (
      <div className="fade-in">
        <Banner/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px"}}>
          <h1 style={{...H1,marginBottom:0}}>Packing List</h1>
          <button style={BS} onClick={printPack}>🖨 Print</button>
        </div>
        <p style={H2}>{tripLabel}{trip.dest?.isDisney&&trip.td.disneyShip?" · "+trip.td.disneyShip:""}{nights?` · ${nights} night${nights!==1?"s":""}`:""}</p>

        {/* ── SMART PACK SETUP CARD ── */}
        <div style={{...CD,marginBottom:"16px",borderColor:m.smartDone?T.gold+"44":T.gold,background:dark?"#1a1f14":T.ai}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer"}} onClick={()=>setSmartOpen(v=>!v)}>
            <span style={{fontSize:"13px"}}>✦</span>
            <span style={{fontSize:"9px",letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:700,color:T.gold,flex:1}}>Smart Pack Setup</span>
            {m.smartDone&&<span style={{fontSize:"9px",color:"#4caf7d",fontWeight:600}}>✓ Done</span>}
            <span style={{fontSize:"11px",color:T.sub}}>{smartOpen?"▲":"▼"}</span>
          </div>

          {smartOpen&&(
            <div style={{marginTop:"16px"}}>
              {/* Swimming */}
              <div style={{marginBottom:"16px"}}>
                <label style={{...LB,marginBottom:"8px"}}>Will there be swimming on this trip?</label>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                  {[["none","No swimming"],["once","Yes — 1–2 days"],["multi","Yes — multiple days"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setSwimType(v)}
                      style={{padding:"6px 14px",borderRadius:"100px",cursor:"pointer",fontSize:"12px",fontWeight:500,
                        background:swimType===v?T.ocn:T.inp,color:swimType===v?"#fff":T.sub,
                        border:`1.5px solid ${swimType===v?T.ocn:T.bdr}`,WebkitTapHighlightColor:"transparent"}}>
                      {l}
                    </button>
                  ))}
                </div>
                {swimType==="multi"&&(
                  <div style={{marginTop:"10px",display:"flex",alignItems:"center",gap:"10px"}}>
                    <label style={{fontSize:"12px",color:T.sub}}>How many swim days?</label>
                    <input type="number" min="2" max="30" style={{...IS,width:"80px",padding:"6px 10px",fontSize:"14px"}}
                      value={swimDays} onChange={e=>setSwimDays(e.target.value)}/>
                    {swimDays&&<span style={{fontSize:"11px",color:T.gold}}>
                      → {Math.min(Math.max(Math.ceil((parseInt(swimDays)||2)/2),2),4)} swimsuits/person
                    </span>}
                  </div>
                )}
              </div>

              {/* Nice dinner outfits */}
              <div style={{marginBottom:"16px"}}>
                <label style={{...LB,marginBottom:"8px"}}>How many nights will you need nice/dinner outfits?</label>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <input type="number" min="0" max="20" style={{...IS,width:"80px",padding:"6px 10px",fontSize:"14px"}}
                    value={formalN} onChange={e=>setFormalN(e.target.value)}/>
                  <span style={{fontSize:"12px",color:T.sub}}>nights</span>
                  {parseInt(formalN)>0&&<span style={{fontSize:"11px",color:T.gold}}>→ {formalN} nice outfit{formalN>1?"s":""}/person</span>}
                </div>
              </div>

              {/* Carry-on */}
              <div style={{marginBottom:"18px"}}>
                <label style={{...LB,marginBottom:"8px"}}>Bags?</label>
                <div style={{display:"flex",gap:"6px"}}>
                  {[["false","Checking bags"],["true","Carry-on only"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setCarryOn(v==="true")}
                      style={{padding:"6px 14px",borderRadius:"100px",cursor:"pointer",fontSize:"12px",fontWeight:500,
                        background:String(carryOn)===v?T.coral:T.inp,color:String(carryOn)===v?"#fff":T.sub,
                        border:`1.5px solid ${String(carryOn)===v?T.coral:T.bdr}`,WebkitTapHighlightColor:"transparent"}}>
                      {l}
                    </button>
                  ))}
                </div>
                {carryOn&&<div style={{fontSize:"11px",color:T.gold,marginTop:"6px"}}>→ TSA liquids note added to toiletries</div>}
              </div>

              {/* Theme park — show for Orlando or if no dest set */}
              {(!dest||isOrlando)&&(
                <div style={{marginBottom:"16px"}}>
                  <label style={{...LB,marginBottom:"8px"}}>Will you be visiting a theme park?</label>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {[["none","No parks"],["disney","Disney parks"],["universal","Universal parks"],["both","Both"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setThemePark(v)}
                        style={{padding:"6px 14px",borderRadius:"100px",cursor:"pointer",fontSize:"12px",fontWeight:500,
                          background:themePark===v?T.ocn:T.inp,color:themePark===v?"#fff":T.sub,
                          border:`1.5px solid ${themePark===v?T.ocn:T.bdr}`,WebkitTapHighlightColor:"transparent"}}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Celebrating */}
              <div style={{marginBottom:"18px"}}>
                <label style={{...LB,marginBottom:"8px"}}>Are you celebrating anything on this trip?</label>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                  {[["none","Every trip is special!"],["holiday","Holiday"],["birthday","Birthday"],["anniversary","Anniversary"],["other","Something else"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setCelebrating(v)}
                      style={{padding:"6px 14px",borderRadius:"100px",cursor:"pointer",fontSize:"12px",fontWeight:500,
                        background:celebrating===v?T.gold:T.inp,color:celebrating===v?"#fff":T.sub,
                        border:`1.5px solid ${celebrating===v?T.gold:T.bdr}`,WebkitTapHighlightColor:"transparent"}}>
                      {l}
                    </button>
                  ))}
                </div>
                {celebrating!=="none"&&<div style={{fontSize:"11px",color:T.gold,marginTop:"6px"}}>🎉 We'll add celebration extras to your list!</div>}
              </div>

              <button style={BN} onClick={saveSmartMeta}>✦ Build My List</button>
              {m.smartDone&&<button style={{...BG,marginLeft:"8px"}} onClick={()=>{upTrip({packMeta:{...m,smartDone:false}});setSmartOpen(true);}}>Edit</button>}
            </div>
          )}

          {!smartOpen&&m.smartDone&&(
            <div style={{marginTop:"8px",display:"flex",gap:"8px",flexWrap:"wrap",fontSize:"11px",color:T.sub}}>
              {m.swimType!=="none"&&<span style={{...Object.assign({},{}),padding:"2px 8px",background:T.pill,color:T.pillc,borderRadius:"100px",fontSize:"10px",fontWeight:600}}>
                🏊 {m.swimType==="multi"?`${m.swimDays} swim days`:"1–2 swim days"}
              </span>}
              {m.formalNights>0&&<span style={{padding:"2px 8px",background:T.pill,color:T.pillc,borderRadius:"100px",fontSize:"10px",fontWeight:600}}>
                🍽 {m.formalNights} formal night{m.formalNights>1?"s":""}
              </span>}
              {m.carryOnOnly&&<span style={{padding:"2px 8px",background:T.pill,color:T.pillc,borderRadius:"100px",fontSize:"10px",fontWeight:600}}>
                🎒 Carry-on only
              </span>}
              {m.themePark&&m.themePark!=="none"&&<span style={{padding:"2px 8px",background:T.pill,color:T.pillc,borderRadius:"100px",fontSize:"10px",fontWeight:600}}>
                🎡 {m.themePark==="disney"?"Disney parks":m.themePark==="universal"?"Universal parks":"Disney + Universal"}
              </span>}
              {m.celebrating&&m.celebrating!=="none"&&<span style={{padding:"2px 8px",background:T.gold+"22",color:T.gold,borderRadius:"100px",fontSize:"10px",fontWeight:600}}>
                🎉 {m.celebrating.charAt(0).toUpperCase()+m.celebrating.slice(1)}
              </span>}
              <button onClick={()=>setSmartOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:T.ocn,fontSize:"10px",textDecoration:"underline",padding:0,marginLeft:"4px"}}>Edit</button>
            </div>
          )}
        </div>

        {/* ── TRAVELER FILTER ── */}
        {knownTravelers.length>1&&(
          <div style={{marginBottom:"16px"}}>
            <div style={{fontSize:"9px",letterSpacing:"0.14em",textTransform:"uppercase",color:T.sub,fontWeight:500,marginBottom:"8px"}}>View list for</div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              <button onClick={()=>upTrip({packFilter:[]})}
                style={{padding:"5px 13px",borderRadius:"100px",cursor:"pointer",fontSize:"12px",fontWeight:600,
                  background:isAllSelected?T.ocn:T.inp,color:isAllSelected?"#fff":T.sub,
                  border:`1.5px solid ${isAllSelected?T.ocn:T.bdr}`,WebkitTapHighlightColor:"transparent"}}>
                {isAllSelected?"✓ ":""} Everyone
              </button>
              {knownTravelers.map(name=>{
                const sel=packFilter.includes(name);
                return (
                  <button key={name} onClick={()=>toggleFilter(name)}
                    style={{padding:"5px 13px",borderRadius:"100px",cursor:"pointer",fontSize:"12px",fontWeight:500,
                      background:sel?T.coral:T.inp,color:sel?"#fff":T.sub,
                      border:`1.5px solid ${sel?T.coral:T.bdr}`,WebkitTapHighlightColor:"transparent"}}>
                    {sel?"✓ "+name:name}
                  </button>
                );
              })}
            </div>
            {packFilter.length>0&&<div style={{fontSize:"11px",color:T.fnt,marginTop:"6px"}}>
              Showing items for: <strong style={{color:T.tx}}>{packFilter.join(", ")}</strong>
              {" · "}<button onClick={()=>upTrip({packFilter:[]})} style={{background:"none",border:"none",cursor:"pointer",color:T.ocn,fontSize:"11px",textDecoration:"underline",padding:0}}>Show all</button>
            </div>}
          </div>
        )}

        {/* ── PROGRESS BAR ── */}
        <div style={{display:"flex",alignItems:"center",gap:"11px",marginBottom:"20px"}}>
          <div style={{flex:1,background:T.bdr,borderRadius:"4px",height:"6px"}}>
            <div style={{background:T.coral,height:"6px",borderRadius:"4px",width:`${totalN?(checkedN/totalN)*100:0}%`,transition:"width 0.4s"}}/>
          </div>
          <span style={{fontSize:"12px",color:T.sub,whiteSpace:"nowrap"}}>{checkedN} / {totalN} packed</span>
        </div>

        {/* ── ITEM LIST ── */}
        {Object.entries(cats).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:"22px"}}>
            <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.coral,marginBottom:"8px"}}>{cat}</div>
            {items.map(item=>{
              const k=`${cat}:${item.name}`;
              const ck=!!trip.packChecked[k];
              const lbl=whoLabel(item, activeFilter);
              return (
                <div key={item.name}
                  style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:`1px solid ${T.bdr}`,cursor:"pointer"}}
                  onClick={()=>upTrip({packChecked:{...trip.packChecked,[k]:!ck}})}>
                  <div style={{width:"17px",height:"17px",border:`1.5px solid ${ck?T.coral:T.chk}`,borderRadius:"4px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:ck?T.coral:"transparent"}}>
                    {ck&&<span style={{color:"#fff",fontSize:"10px",fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:"14px",flex:1,color:ck?T.fnt:T.tx,textDecoration:ck?"line-through":"none"}}>{item.name}</span>
                  {lbl&&<span style={{fontSize:"9px",fontWeight:600,padding:"2px 8px",borderRadius:"100px",
                    background:ck?T.bdr:T.pill,color:ck?T.fnt:T.pillc,whiteSpace:"nowrap",flexShrink:0,transition:"all 0.2s"
                  }}>{lbl}</span>}
                </div>
              );
            })}
          </div>
        ))}

        {/* ── ADD CUSTOM ITEM ── */}
        <div style={{marginBottom:"20px"}}>
          {!showAddItem?(
            <button style={BS} onClick={()=>setShowAddItem(true)}>+ Add Item</button>
          ):(
            <div style={{...CD,borderColor:T.ocn+"55"}}>
              <div style={{fontSize:"9px",letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:700,color:T.ocn,marginBottom:"14px"}}>Add Custom Item</div>

              <div style={{marginBottom:"10px"}}>
                <label style={LB}>Item name</label>
                <input style={IS} placeholder="e.g. Portable fan, Rain poncho…"
                  value={ciName} onChange={e=>setCiName(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addCustomItem()}/>
              </div>

              <div style={{...G2,marginBottom:"10px"}}>
                <div>
                  <label style={LB}>Who is this for?</label>
                  <select style={SS} value={ciWho} onChange={e=>setCiWho(e.target.value)}>
                    <option value="all">Everyone</option>
                    <option value="adults">Adults (Sarah & Rene)</option>
                    <option value="kids">Kids (Roman & Samantha)</option>
                    {knownTravelers.map(t=><option key={t} value={t}>{t} only</option>)}
                  </select>
                </div>
                <div>
                  <label style={LB}>Quantity</label>
                  <input type="number" min="1" max="99" style={{...IS,width:"100%"}}
                    value={ciQty} onChange={e=>setCiQty(e.target.value)}/>
                </div>
              </div>

              <div style={{marginBottom:"10px"}}>
                <label style={LB}>Section</label>
                <select style={SS} value={ciSection} onChange={e=>setCiSection(e.target.value)}>
                  <option value="auto">✦ Choose for me</option>
                  {allSections.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                {ciSection==="auto"&&ciName&&(
                  <div style={{fontSize:"10px",color:T.gold,marginTop:"4px"}}>→ Will be placed in: {guessSection(ciName)}</div>
                )}
              </div>

              <div style={{marginBottom:"14px",display:"flex",alignItems:"center",gap:"8px",cursor:"pointer"}} onClick={()=>setCiPerPerson(v=>!v)}>

                  {ciSaveDefault&&<span style={{color:"#fff",fontSize:"9px",fontWeight:700}}>✓</span>}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmtD = iso => { if(!iso) return ""; const d=new Date(iso); return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); };
const fmtT = (iso,h24) => { if(!iso) return ""; const d=new Date(iso); return h24?d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false}):d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}); };
const fmtSaved = (iso,h24) => iso?`${fmtD(iso)} · ${fmtT(iso,h24)}`:null;
const todayStr = () => new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
const todayShort = () => new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const uid = () => Math.random().toString(36).slice(2,10);

// Convert file to Base64 — this is the key fix for persistent photos
const fileToB64 = file => new Promise((res,rej) => {
  // Resize to max 1200px wide before encoding to keep storage reasonable
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    const MAX = 1200;
    let w=img.width, h=img.height;
    if(w>MAX){ h=Math.round(h*(MAX/w)); w=MAX; }
    const canvas = document.createElement("canvas");
    canvas.width=w; canvas.height=h;
    canvas.getContext("2d").drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    res(canvas.toDataURL("image/jpeg",0.82));
  };
  img.onerror = rej;
  img.src = url;
});

function Wave({size=48,dark=false}) {
  const c1=dark?"#dbb96a":"#c49a3c",c2=dark?"#9fd0e4":"#1d4f68",c3=dark?"#ffffff":"#cce9f5";
  return (
    <svg width={size} height={Math.round(size*0.42)} viewBox="0 0 86 36" fill="none">
      <path d="M4,10 C20,0 44,24 64,10 C72,5 78,2 82,1" stroke={c1} strokeWidth="2.6" fill="none" strokeLinecap="round"/>
      <path d="M4,20 C20,10 44,34 64,20 C72,15 78,12 82,11" stroke={c2} strokeWidth="1.7" fill="none" strokeLinecap="round"/>
      <path d="M4,29 C20,19 44,43 64,29 C72,24 78,21 82,20" stroke={c3} strokeWidth="1.0" fill="none" strokeLinecap="round"/>
    </svg>
  );
}

// ══ PLAN (top-level — stable reference, no remount on App re-render) ══════════
function PlanPage({ctx}) {
  const {trip,upTrip,T,IS,SS,TS,BN,BS,BG,CD,LB,H1,H2,G2,AB,go,busy,aiResp,callAI,TRAVELERS,DISNEY_SHIPS,tripLabel,fmtD,dark} = ctx;
  T.pill=ctx.pill; T.pillc=ctx.pillc; T.fnt=ctx.fnt; T.sub=T.sub||ctx.sub;
  const dest = trip.dest;
  if(!dest) return <div style={{color:T.sub,padding:"40px 0",textAlign:"center"}}>Please select a destination in Discover first.</div>;
  const td = trip.td;

  const togTrav = name => {
    const c=td.travelers, n=c.includes(name)?c.filter(x=>x!==name):[...c,name];
    upTrip({td:{...td,travelers:n}});
  };

  // All text/date state is LOCAL — never touches global on keystroke
  const [draft,setDraft] = React.useState({
    tripName:  trip.tripName||"",
    startDate: td.startDate||"",
    endDate:   td.endDate||"",
    disneyShip:td.disneyShip||"",
    notes:     td.notes||"",
    outFlight: td.spec?.outFlight||"",
    retFlight: td.spec?.retFlight||"",
    lodging:   td.spec?.lodging||"",
    transport: td.spec?.transport||"",
    other:     td.spec?.other||"",
  });
  const sd = (k,v) => setDraft(d=>({...d,[k]:v}));
  const startRef = React.useRef(null);
  const endRef   = React.useRef(null);

  // Only flush to global on blur — keyboard stays open
  const flush = (k,v) => {
    if(k==="tripName"){ upTrip({tripName:v}); return; }
    if(["startDate","endDate","disneyShip","notes"].includes(k)){ upTrip({td:{...trip.td,[k]:v}}); return; }
    upTrip({td:{...trip.td,spec:{...trip.td.spec,[k]:v}}});
  };

  // Generate name from destination + departure month/year
  const genTripName = () => {
    const destShort = dest.name.split(",")[0].trim();
    if(draft.startDate) {
      const d = new Date(draft.startDate + "T12:00:00");
      const mon = d.toLocaleString("en-US",{month:"long"});
      const yr  = d.getFullYear();
      return `${destShort} ${mon} ${yr}`;
    }
    return destShort;
  };

  // Trip name banner (inline — no ctx.Banner to avoid unstable reference)
  const showBanner = trip.tripName;

  return (
    <div>
      {showBanner&&(
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"18px",padding:"10px 14px",background:ctx.dark?"#1a3a50":"#fffbf0",border:`1px solid ${T.gold}44`,borderRadius:"8px"}}>
          <span style={{fontSize:"18px"}}>{dest?.img||"🧭"}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.gold}}>{trip.tripName}</div>
            {dest&&<div style={{fontSize:"11px",color:T.sub}}>{dest.name}{td.startDate?` · ${fmtD(td.startDate)}`:""}{td.disneyShip?` · ${td.disneyShip}`:""}</div>}
          </div>
          {td.travelers.length>0&&<div style={{display:"flex",gap:"3px",flexWrap:"wrap",justifyContent:"flex-end"}}>
            {td.travelers.map(v=><span key={v} style={{fontSize:"10px",padding:"2px 7px",background:T.pill,color:T.pillc,borderRadius:"100px",fontWeight:600}}>{v}</span>)}
          </div>}
        </div>
      )}
      <h1 style={H1}>Plan Your Corso</h1>
      <p style={H2}>{dest.name}</p>

      {/* Trip Name */}
      <div style={CD}>
        <div style={{fontSize:"9px",letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:600,color:T.coral,marginBottom:"11px"}}>Name Your Corso</div>
        <div style={{display:"flex",gap:"8px",alignItems:"flex-end"}}>
          <div style={{flex:1}}><label style={LB}>Trip Name</label>
            <input style={IS}
              placeholder={`e.g. ${dest.name.split(",")[0]} June 2025`}
              value={draft.tripName}
              onChange={e=>sd("tripName",e.target.value)}
              onBlur={e=>flush("tripName",e.target.value)}/>
          </div>
          <button style={{...BS,marginBottom:"1px",whiteSpace:"nowrap"}} onClick={()=>{
            const n=genTripName(); sd("tripName",n); upTrip({tripName:n});
          }}>✦ Generate</button>
        </div>
        {draft.tripName&&<div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"13px",color:T.gold,marginTop:"8px"}}>{draft.tripName}</div>}
      </div>

      {/* Dates — refs avoid re-render while iOS picker is open */}
      <div style={{...G2,marginBottom:"11px"}}>
        <div><label style={LB}>Departure Date</label>
          <input type="date" style={IS}
            defaultValue={draft.startDate}
            ref={startRef}
            onChange={e=>{ startRef.current._val=e.target.value; }}
            onBlur={e=>{ const v=e.target.value||startRef.current._val||""; sd("startDate",v); flush("startDate",v); }}/>
        </div>
        <div><label style={LB}>Return Date</label>
          <input type="date" style={IS}
            defaultValue={draft.endDate}
            ref={endRef}
            onChange={e=>{ endRef.current._val=e.target.value; }}
            onBlur={e=>{ const v=e.target.value||endRef.current._val||""; sd("endDate",v); flush("endDate",v); }}/>
        </div>
      </div>

      {dest.isDisney&&<div style={{marginBottom:"11px"}}>
        <label style={LB}>Which Disney Ship?</label>
        <select style={SS} value={draft.disneyShip}
          onChange={e=>{sd("disneyShip",e.target.value);upTrip({td:{...trip.td,disneyShip:e.target.value}});}}>
          <option value="">Select a ship…</option>
          {DISNEY_SHIPS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>}

      {/* Travelers */}
      <div style={{marginBottom:"11px"}}>
        <label style={LB}>Who's Going?</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:"7px"}}>
          {TRAVELERS.map(name=>{const sel=td.travelers.includes(name);return(
            <button key={name} onClick={()=>togTrav(name)}
              style={{padding:"7px 14px",borderRadius:"100px",cursor:"pointer",fontSize:"13px",fontWeight:500,
                background:sel?T.ocn:T.inp,color:sel?"#fff":T.sub,border:`1.5px solid ${sel?T.ocn:T.bdr}`,
                WebkitTapHighlightColor:"transparent"}}>
              {sel?"✓ "+name:name}
            </button>
          );})}
        </div>
        {td.travelers.length>0&&<div style={{marginTop:"8px",fontSize:"12px",color:T.sub}}>Going: <strong style={{color:T.tx}}>{td.travelers.join(", ")}</strong></div>}
      </div>

      {/* Travel Specifics */}
      <div style={CD}>
        <div style={{fontSize:"9px",letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:600,color:T.coral,marginBottom:"11px"}}>
          Travel Specifics <span style={{fontWeight:400,color:T.fnt,letterSpacing:"0.06em"}}>(optional)</span>
        </div>
        <div style={{...G2,marginBottom:"9px"}}>
          <div><label style={LB}>Outbound Flight</label>
            <input style={IS} placeholder="AA 1234 · 8:00 AM"
              value={draft.outFlight}
              onChange={e=>sd("outFlight",e.target.value)}
              onBlur={e=>flush("outFlight",e.target.value)}/>
          </div>
          <div><label style={LB}>Return Flight</label>
            <input style={IS} placeholder="AA 5678 · 3:30 PM"
              value={draft.retFlight}
              onChange={e=>sd("retFlight",e.target.value)}
              onBlur={e=>flush("retFlight",e.target.value)}/>
          </div>
        </div>
        <div style={{marginBottom:"9px"}}><label style={LB}>Lodging / Resort / Cabin</label>
          <input style={IS} placeholder="Hotel · Room, or Ship · Stateroom"
            value={draft.lodging}
            onChange={e=>sd("lodging",e.target.value)}
            onBlur={e=>flush("lodging",e.target.value)}/>
        </div>
        <div style={{marginBottom:"9px"}}><label style={LB}>Ground Transport / Car Rental</label>
          <input style={IS} placeholder="Rental car, Uber from port, shuttle…"
            value={draft.transport}
            onChange={e=>sd("transport",e.target.value)}
            onBlur={e=>flush("transport",e.target.value)}/>
        </div>
        <div><label style={LB}>Other Notes</label>
          <input style={IS} placeholder="Visa requirements, travel insurance, reservations…"
            value={draft.other}
            onChange={e=>sd("other",e.target.value)}
            onBlur={e=>flush("other",e.target.value)}/>
        </div>
      </div>

      {/* Must-Dos */}
      <div style={{marginBottom:"13px"}}><label style={LB}>Must-Do's & Notes</label>
        <textarea style={TS} placeholder="Things you definitely want to experience…"
          value={draft.notes}
          onChange={e=>sd("notes",e.target.value)}
          onBlur={e=>flush("notes",e.target.value)}/>
      </div>

      {/* AI buttons */}
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"13px"}}>
        <button style={BS} onClick={()=>{
          const cur=trip.td;
          const days=cur.startDate&&cur.endDate?Math.ceil((new Date(cur.endDate)-new Date(cur.startDate))/86400000):"several";
          const who=cur.travelers.length?`Traveling party: ${cur.travelers.join(", ")}.`:"";
          const ship=dest.isDisney&&cur.disneyShip?`Disney ship: ${cur.disneyShip}.`:"";
          const sp=cur.spec, spStr=[sp?.outFlight?`Outbound: ${sp.outFlight}`:"",sp?.retFlight?`Return: ${sp.retFlight}`:"",sp?.lodging?`Lodging: ${sp.lodging}`:"",sp?.transport?`Transport: ${sp.transport}`:"",sp?.other?`Other: ${sp.other}`:""].filter(Boolean).join(". ");
          callAI(`Create a detailed day-by-day itinerary for ${days} days in ${dest.name}. ${who} ${ship} ${spStr?`Travel details: ${spStr}.`:""} ${cur.notes?`Must-do: ${cur.notes}.`:""} Format each day with Morning, Afternoon, Evening. Include travel specifics on Day 1 and final day.`);
        }}>◈ Generate Itinerary</button>
        <button style={BS} onClick={()=>callAI(`Top 5 local restaurants and must-try dishes in ${dest.name}. Brief description of each.`)}>◈ Restaurant Guide</button>
        <button style={BN} onClick={()=>go("pack")}>Build Pack List →</button>
      </div>
      {busy&&<div style={{...AB,color:T.gold}}>Building your plan…</div>}
      {aiResp&&<div style={AB}><div style={{fontSize:"9px",color:T.gold,letterSpacing:"0.15em",marginBottom:"8px",fontWeight:600}}>◈ AI PLAN</div><div style={{whiteSpace:"pre-line"}}>{aiResp}</div></div>}
    </div>
  );
}

// ══ JOURNAL (top-level — stable reference) ════════════════════════════════════
function JournalPage({ctx}) {
  const {trip,upTrip,T,IS,TS,BN,BS,BG,CD,LB,H1,H2,go,sidebar,setSidebar,setViewId,setLightbox,handlePhotos,setTrips,tripLabel,todayStr,todayShort,fmtD} = ctx;

  // ── Uncontrolled refs for journal text — ZERO re-renders while typing ──────
  const goodRef      = React.useRef(null);
  const badRef       = React.useRef(null);
  const highlightRef = React.useRef(null);
  const jFileRef     = React.useRef();
  const editFileRef  = React.useRef();

  // ── Editable entry date — defaults to today, stored locally ────────────────
  const todayISO = () => new Date().toISOString().slice(0,10);
  const [entryDate, setEntryDate] = React.useState(todayISO());
  const dateRef = React.useRef(null);

  // ── Edit state for previous entries ────────────────────────────────────────
  const [editIdx,setEditIdx]     = React.useState(null);
  const [editDraft,setEditDraft] = React.useState({good:"",bad:"",highlight:""});
  const setED = (k,v) => setEditDraft(d=>({...d,[k]:v}));

  const clearForm = () => {
    if(goodRef.current)      goodRef.current.value      = "";
    if(badRef.current)       badRef.current.value       = "";
    if(highlightRef.current) highlightRef.current.value = "";
    // Reset date to today
    const t = todayISO();
    setEntryDate(t);
    if(dateRef.current) dateRef.current.value = t;
  };

  const openEdit = (i) => {
    const e = trip.journal[i];
    setEditDraft({good:e.good||"",bad:e.bad||"",highlight:e.highlight||""});
    setEditIdx(i);
  };
  const closeEdit = () => setEditIdx(null);
  const saveEdit  = (i) => {
    upTrip({journal:trip.journal.map((e,idx)=>idx===i?{...e,...editDraft}:e)});
    setEditIdx(null);
  };

  const deleteEntry = (i) => {
    if(!window.confirm("Clear this entry? It will be replaced with a skipped day you can edit.")) return;
    const entry    = trip.journal[i];
    const removedIds = new Set(entry.photoIds||[]);
    const otherRefs  = new Set(trip.journal.filter((_,idx)=>idx!==i).flatMap(e=>e.photoIds||[]));
    const toDelete   = [...removedIds].filter(id=>!otherRefs.has(id));
    const updated    = trip.journal.map((e,idx)=>idx===i
      ? {day:e.day, date:e.date, good:"", bad:"", highlight:"", skipped:true, photoIds:[]}
      : e
    );
    upTrip({journal:updated, photos:trip.photos.filter(p=>!toDelete.includes(p.id))});
    if(editIdx===i) setEditIdx(null);
  };

  const deletePhoto = (entryIdx, photoId) => {
    upTrip({
      journal: trip.journal.map((e,i)=>i===entryIdx?{...e,photoIds:(e.photoIds||[]).filter(id=>id!==photoId)}:e),
      photos:  trip.photos.filter(p=>p.id!==photoId),
    });
  };

  // Format the ISO date for display in the header
  const fmtEntryDate = (iso) => {
    if(!iso) return todayStr();
    const d = new Date(iso+"T12:00:00");
    return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  };

  return (
    <div>
      {trip.tripName&&(
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"18px",padding:"10px 14px",background:ctx.dark?"#1a3a50":"#fffbf0",border:`1px solid ${T.gold}44`,borderRadius:"8px"}}>
          <span style={{fontSize:"18px"}}>{trip.dest?.img||"🧭"}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.gold}}>{trip.tripName}</div>
            {trip.dest&&<div style={{fontSize:"11px",color:T.sub}}>{trip.dest.name}{trip.td.startDate?` · ${fmtD(trip.td.startDate)}`:""}{trip.td.disneyShip?` · ${trip.td.disneyShip}`:""}</div>}
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px"}}>
        <h1 style={{...H1,marginBottom:0}}>Travel Journal</h1>
        <button style={BS} onClick={()=>{setSidebar(v=>!v);setViewId(null);}}>{sidebar?"Close ✕":"All Corsos ↗"}</button>
      </div>
      <p style={{fontSize:"11px",color:T.sub,letterSpacing:"0.14em",marginBottom:"20px",textTransform:"uppercase",fontWeight:500}}>{tripLabel}</p>

      {/* ── NEW ENTRY FORM ── */}
      <div style={CD}>
        {/* Day header with editable date */}
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"17px",flexWrap:"wrap"}}>
          <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"15px",color:T.gold,flex:1}}>
            Day {trip.journalDay} — {fmtEntryDate(entryDate)}
          </div>
          <input type="date" style={{...IS,width:"auto",fontSize:"12px",padding:"5px 9px"}}
            defaultValue={entryDate}
            ref={dateRef}
            onChange={e=>{ dateRef.current._val=e.target.value; }}
            onBlur={e=>{ const v=e.target.value||dateRef.current._val||entryDate; setEntryDate(v); }}/>
        </div>

        {/* Uncontrolled textareas — no onChange state update, keyboard stays open */}
        {[{r:goodRef,     ic:"✦",lb:"A good memory from today",       ph:"Something wonderful that happened…",    cl:T.ocn},
          {r:badRef,      ic:"◦", lb:"Something to remember (challenge)",ph:"What didn't go as planned…",           cl:"#e05555"},
          {r:highlightRef,ic:"★",lb:"The highlight of the day",        ph:"If you had to pick one unforgettable moment…",cl:T.gold}
        ].map(({r,ic,lb,ph,cl})=>(
          <div key={lb} style={{marginBottom:"14px"}}>
            <label style={{...LB,color:cl}}>{ic} {lb}</label>
            <textarea ref={r} style={{...TS,borderColor:cl+"44"}} placeholder={ph} defaultValue=""/>
          </div>
        ))}

        <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
          <button style={BN} onClick={()=>{
            const good=goodRef.current?.value||"", bad=badRef.current?.value||"", highlight=highlightRef.current?.value||"";
            if(!good&&!bad&&!highlight) return;
            const dayNum=trip.journalDay;
            const dateStr=new Date((entryDate||todayISO())+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
            upTrip({journal:[...trip.journal,{day:dayNum,date:dateStr,good,bad,highlight,photoIds:[]}],journalDay:trip.journalDay+1});
            clearForm();
          }}>Save Day {trip.journalDay}</button>

          <button style={BS} onClick={()=>{
            const dayNum=trip.journalDay;
            const dateStr=new Date((entryDate||todayISO())+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
            upTrip({journal:[...trip.journal,{day:dayNum,date:dateStr,good:"",bad:"",highlight:"",skipped:true,photoIds:[]}],journalDay:trip.journalDay+1});
            clearForm();
          }}>Skip Day {trip.journalDay}</button>

          <label style={{...BG,display:"inline-block",cursor:"pointer",padding:"8px 14px"}}>
            📷 Photos
            <input type="file" accept="image/*" multiple style={{display:"none"}} ref={jFileRef}
              onChange={async e=>{
                const files=Array.from(e.target.files); if(!files.length) return;
                const dayNum=trip.journalDay;
                const ids=await handlePhotos(files,dayNum);
                setTrips(ts=>ts.map(t=>{
                  if(t.id!==trip.id) return t;
                  const jCopy=[...t.journal];
                  const idx=jCopy.findLastIndex(en=>en.day===dayNum);
                  if(idx>=0) jCopy[idx]={...jCopy[idx],photoIds:[...(jCopy[idx].photoIds||[]),...ids]};
                  return {...t,journal:jCopy};
                }));
                e.target.value="";
              }}/>
          </label>
          <span style={{fontSize:"11px",color:T.fnt}}>{trip.photos.length} photo{trip.photos.length!==1?"s":""} stored</span>
        </div>
      </div>

      {/* ── PREVIOUS ENTRIES ── */}
      {trip.journal.length>0&&(
        <div style={{marginBottom:"17px"}}>
          <div style={LB}>Previous Entries — {tripLabel}</div>
          {trip.journal.map((e,i)=>{
            const entryPhotos=(e.photoIds||[]).map(pid=>trip.photos.find(p=>p.id===pid)).filter(Boolean);
            const isEditing = editIdx===i;
            return (
              <div key={i} style={{...CD,cursor:"default",borderColor:isEditing?T.gold:T.bdr}}>
                {/* Entry header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                  <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"12px",color:T.gold}}>
                    Day {e.day} · {e.date}{e.skipped?" — Skipped":""}
                  </div>
                  <div style={{display:"flex",gap:"5px"}}>
                    {!isEditing&&<button style={{...BG,padding:"3px 9px",fontSize:"9px"}} onClick={()=>openEdit(i)}>✏️ Edit</button>}
                    <button style={{...BG,padding:"3px 9px",fontSize:"9px",color:"#e05555",borderColor:"#e0555544"}} onClick={()=>deleteEntry(i)}>🗑 Delete</button>
                  </div>
                </div>

                {/* EDIT MODE */}
                {isEditing ? (
                  <div>
                    {e.skipped&&<div style={{fontSize:"11px",color:T.sub,marginBottom:"10px",fontStyle:"italic"}}>This day was skipped — add notes below to update it.</div>}
                    {[{k:"good",ic:"✦",lb:"Good memory",cl:T.ocn},
                      {k:"bad", ic:"◦", lb:"Challenge",  cl:"#e05555"},
                      {k:"highlight",ic:"★",lb:"Highlight",cl:T.gold}].map(({k,ic,lb,cl})=>(
                      <div key={k} style={{marginBottom:"10px"}}>
                        <label style={{...LB,color:cl,marginBottom:"4px"}}>{ic} {lb}</label>
                        <textarea style={{...TS,minHeight:"54px",borderColor:cl+"44"}}
                          value={editDraft[k]}
                          onChange={ev=>setED(k,ev.target.value)}/>
                      </div>
                    ))}
                    {/* Photo management */}
                    <div style={{marginBottom:"12px"}}>
                      <label style={{...LB,marginBottom:"6px"}}>Photos ({entryPhotos.length})</label>
                      {entryPhotos.length>0&&(
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(72px,1fr))",gap:"5px",marginBottom:"8px"}}>
                          {entryPhotos.map((p,pi)=>(
                            <div key={pi} style={{position:"relative"}}>
                              <img src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"6px",border:`1px solid ${T.bdr}`,display:"block"}} alt="" onClick={()=>setLightbox(p)}/>
                              <button onClick={()=>deletePhoto(i,p.id)}
                                style={{position:"absolute",top:"2px",right:"2px",background:"rgba(220,60,60,0.85)",border:"none",borderRadius:"50%",width:"18px",height:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:"#fff",lineHeight:1}}>✕</button>
                            </div>
                          ))}
                        </div>
                      )}
                      <label style={{...BG,display:"inline-block",cursor:"pointer",padding:"5px 10px",fontSize:"10px"}}>
                        + Add Photos
                        <input type="file" accept="image/*" multiple style={{display:"none"}} ref={editFileRef}
                          onChange={async ev=>{
                            const files=Array.from(ev.target.files); if(!files.length) return;
                            const ids=await handlePhotos(files,e.day);
                            setTrips(ts=>ts.map(t=>{
                              if(t.id!==trip.id) return t;
                              const jCopy=[...t.journal];
                              jCopy[i]={...jCopy[i],photoIds:[...(jCopy[i].photoIds||[]),...ids]};
                              return {...t,journal:jCopy};
                            }));
                            ev.target.value="";
                          }}/>
                      </label>
                    </div>
                    <div style={{display:"flex",gap:"8px"}}>
                      <button style={BN} onClick={()=>saveEdit(i)}>Save Changes</button>
                      <button style={BG} onClick={closeEdit}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  /* VIEW MODE */
                  <div>
                    {e.skipped&&!e.good&&!e.bad&&!e.highlight ? (
                      <div style={{fontSize:"13px",color:T.fnt,fontStyle:"italic"}}>Day skipped — tap Edit to add notes.</div>
                    ) : (
                      <div>
                        {e.good&&<div style={{fontSize:"13px",color:T.tx,marginBottom:"4px"}}><span style={{color:T.ocn}}>✦</span> {e.good}</div>}
                        {e.bad&&<div style={{fontSize:"13px",color:T.tx,marginBottom:"4px"}}><span style={{color:"#e05555"}}>◦</span> {e.bad}</div>}
                        {e.highlight&&<div style={{fontSize:"13px",color:T.tx,marginBottom:"8px"}}><span style={{color:T.gold}}>★</span> {e.highlight}</div>}
                      </div>
                    )}
                    {entryPhotos.length>0&&(
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:"5px",marginTop:"8px"}}>
                        {entryPhotos.map((p,pi)=>(
                          <img key={pi} src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"6px",cursor:"pointer",border:`1px solid ${T.bdr}`}} alt="" onClick={()=>setLightbox(p)}/>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {trip.journal.length>=2&&<div style={{textAlign:"right"}}><button style={BN} onClick={()=>go("memoir")}>See Your Memoir →</button></div>}
    </div>
  );
}


// ══ MAIN APP ══════════════════════════════════════════════════════════════════
function App() {
  const [trips,setTrips]     = useState([mkTrip()]);
  const [aid,setAid]         = useState(null);
  const [aiResp,setAiResp]   = useState(null);
  const [busy,setBusy]       = useState(false);
  const [dark,setDark]       = useState(false);
  const [h24,setH24]         = useState(true);
  const [ph,setPh]           = useState("discover");
  const [saveSt,setSaveSt]   = useState("idle");
  const [lastSav,setLastSav] = useState(null);
  const [sidebar,setSidebar] = useState(false);
  const [viewId,setViewId]   = useState(null);
  // album state
  const [albumTrip,setAlbumTrip]   = useState(null);  // which trip's album is open
  const [lightbox,setLightbox]     = useState(null);  // {b64,caption,dayRef}
  const [albumView,setAlbumView]   = useState("grid"); // grid | journal | memoir
  const [mobileSettings,setMobileSettings] = useState(false);
  const fileRef=useRef(), impRef=useRef(), saveT=useRef(null);

  const trip = trips.find(t=>t.id===aid)||trips[0];
  const upTrip = useCallback(p=>setTrips(ts=>ts.map(t=>t.id===trip.id?{...t,...p}:t)),[trip?.id]);

  // ── PERSISTENCE ──────────────────────────────────────────────────────────────
  useEffect(()=>{
    try {
      const r=localStorage.getItem(SK); if(!r) return;
      const s=JSON.parse(r);
      if(s.trips?.length) setTrips(s.trips);
      if(s.aid) setAid(s.aid);
      if(s.ph) setPh(s.ph);
      if(s.dark!==undefined) setDark(s.dark);
      if(s.h24!==undefined) setH24(s.h24);
      if(s.lastSav) setLastSav(s.lastSav);
    } catch(e) { console.warn("Corso load error:",e); }
  },[]);

  const doSave = useCallback((tr,a,p,dk,_h24)=>{
    setSaveSt("saving"); clearTimeout(saveT.current);
    saveT.current = setTimeout(()=>{
      try {
        const ts=new Date().toISOString();
        localStorage.setItem(SK,JSON.stringify({trips:tr,aid:a,ph:p,dark:dk,h24:_h24,lastSav:ts}));
        setLastSav(ts); setSaveSt("saved"); setTimeout(()=>setSaveSt("idle"),2500);
      } catch(e) {
        setSaveSt("idle");
        if(e.name==="QuotaExceededError") alert("Storage full — your photos may be taking up too much space. Try exporting a backup and removing some photos.");
      }
    },1500);
  },[]);

  useEffect(()=>{ doSave(trips,aid,ph,dark,h24); },[trips,aid,ph,dark,h24]);

  // ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
  const doExport = () => {
    const blob = new Blob([JSON.stringify({trips,aid,ph,dark,h24,exportedAt:new Date().toISOString(),version:4},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`corso-${new Date().toISOString().slice(0,10)}.json`; a.click();
  };
  const doImport = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        if(d.trips?.length){
          setTrips(d.trips); setAid(d.aid||d.trips[0].id);
          if(d.ph) setPh(d.ph);
          if(d.dark!==undefined) setDark(d.dark);
          if(d.h24!==undefined) setH24(d.h24);
        }
      } catch { alert("Invalid Corso backup file."); }
    };
    r.readAsText(f); e.target.value="";
  };

  const go = p => { setPh(p); setAiResp(null); setSidebar(false); };
  // Reset Plan/Pack/Journal/Memoir when user picks a new destination
  const resetForNewDest = (dest) => {
    upTrip({
      dest,
      tripName:"",
      td:{startDate:"",endDate:"",travelers:[],notes:"",disneyShip:"",spec:{outFlight:"",retFlight:"",lodging:"",transport:"",other:""}},
      packChecked:{},
      journal:[],
      photos:[],
      journalDay:1,
      rating:null,
      memoirHistory:[],
    });
  };

  // ── PACK HELPERS ─────────────────────────────────────────────────────────────
  const hasKids = trip.td.travelers.some(v=>["Roman","Samantha","Someone else"].includes(v));
  const packItems = () => {
    if(!trip.dest) return {};
    const d=trip.dest, cats={Always:PACK.Always};
    if(d.isDisney){ cats["Disney Cruise Essentials"]=DISNEY_PACK; cats.Beach=PACK.Beach; }
    else { if(d.type.includes("Beach"))cats.Beach=PACK.Beach; if(d.type.includes("City"))cats.City=PACK.City; if(d.type.includes("Adventure"))cats.Adventure=PACK.Adventure; if(d.type.includes("Culture"))cats.Culture=PACK.Culture; }
    if(hasKids) cats.Kids=KIDS;
    return cats;
  };
  const totalN = Object.values(packItems()).flat().length;
  const checkedN = Object.values(trip.packChecked).filter(Boolean).length;

  // ── AI CALL ───────────────────────────────────────────────────────────────────
  const callAI = async (prompt, onDone) => {
    setBusy(true); setAiResp(null);
    try {
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
      const d=await r.json();
      const text=d.content?.[0]?.text||"No response.";
      setAiResp(text);
      if(onDone) onDone(text);
    } catch { setAiResp("Couldn't reach AI. Please check your internet connection."); }
    setBusy(false);
  };

  const calcRating = () => { const e=trip.journal; if(!e.length)return null; const g=e.filter(x=>x.good).length,b=e.filter(x=>x.bad).length,r=g/(g+b||1); return r>=0.85?"best":r>=0.65?"good":r>=0.45?"tryagain":"never"; };
  const sugR = calcRating();

  const filtDests = DESTS.filter(d=>{
    const {budget,climate,type,region,country}=trip.filters;
    return (region==="Any Region"||d.region===region)&&(!country||d.name.toLowerCase().includes(country.toLowerCase())||d.region===region)&&(budget==="any"||d.budget===budget)&&(climate==="any"||d.climate===climate)&&(type==="any"||d.type.toLowerCase().includes(type.toLowerCase()));
  });

  const tripLabel = trip.tripName||(trip.dest?trip.dest.name:"Untitled Corso");

  // ── PHOTO UPLOAD — Base64 fix ─────────────────────────────────────────────────
  const handlePhotos = async (files, dayRef=null) => {
    const newPhotos = [];
    for(const f of files) {
      try {
        const b64 = await fileToB64(f);
        newPhotos.push({ id:uid(), b64, caption:"", dayRef, dateAdded:todayShort() });
      } catch(e) { console.warn("Photo encode error",e); }
    }
    upTrip({ photos:[...trip.photos, ...newPhotos] });
    return newPhotos.map(p=>p.id);
  };

  // ── PRINT PACK ────────────────────────────────────────────────────────────────
  const printPack = () => {
    const cats=packItems(), td=trip.td;
    const rows=Object.entries(cats).map(([cat,items])=>`<div class="cat"><div class="cth">${cat}</div>${items.map(item=>{const ck=!!trip.packChecked[`${cat}:${item}`];return`<div class="it${ck?" ck":""}"><span class="bx">${ck?"✓":""}</span>${item}</div>`;}).join("")}</div>`).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Packing — ${tripLabel}</title><style>body{font-family:Georgia,serif;color:#2a2420;max-width:660px;margin:32px auto;padding:0 18px}.hdr{text-align:center;border-bottom:2px solid #c49a3c;padding-bottom:16px;margin-bottom:22px}.lo{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#c49a3c;margin-bottom:4px}.tn{font-size:24px;color:#1d4f68;margin-bottom:4px}.mt{font-size:11px;color:#7a6e65;margin-top:2px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:0 24px}.cat{margin-bottom:16px;break-inside:avoid}.cth{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#e8724a;margin-bottom:6px;font-weight:bold}.it{display:flex;align-items:flex-start;gap:6px;font-size:12px;padding:3px 0;border-bottom:1px solid #f0e8d8}.it.ck{color:#b0a898;text-decoration:line-through}.bx{width:12px;height:12px;border:1.5px solid #ddd8ce;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:#e8724a;margin-top:1px}.ft{text-align:center;margin-top:24px;font-size:10px;color:#b0a898;border-top:1px solid #e8e0d4;padding-top:12px}@media print{body{margin:14px}}</style></head><body><div class="hdr"><div class="lo">Corso · Packing List</div><div class="tn">${tripLabel}</div>${td.startDate?`<div class="mt">${fmtD(td.startDate)}${td.endDate?` – ${fmtD(td.endDate)}`:""}</div>`:""} ${td.travelers.length?`<div class="mt">Traveling: ${td.travelers.join(", ")}</div>`:""} ${td.disneyShip?`<div class="mt">Ship: ${td.disneyShip}</div>`:""}<div class="mt">${checkedN} of ${totalN} packed</div></div><div class="grid">${rows}</div><div class="ft">Printed from Corso · Made for the Journey. All of It.</div></body></html>`;
    const w=window.open("","_blank"); w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>w.print(),400);
  };

  // ── THEME ─────────────────────────────────────────────────────────────────────
  const T = dark ? {
    bg:"#0e1c26",bg2:"#122130",bdr:"#1e3448",tx:"#f0ede6",sub:"#7a9aac",fnt:"#3a5a6e",
    gold:"#dbb96a",ocn:"#9fd0e4",dep:"#1d4f68",coral:"#e8724a",
    nav:"#162535",crd:"#162535",inp:"#1e3448",inpb:"#2a4a5e",

    const viewing = openTrip ? trips.find(t=>t.id===openTrip) : null;

    if(viewing) {
      const vLabel = viewing.tripName||(viewing.dest?viewing.dest.name:"Untitled Corso");
      const allPhotos = viewing.photos||[];
      const latestMemoir = viewing.memoirHistory?.length ? viewing.memoirHistory[viewing.memoirHistory.length-1] : null;

      return (
        <div className="fade-in">
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"22px"}}>
            <button style={BG} onClick={()=>{setOpenTrip(null);setAlbumTrip(null);setView("grid");setAlbumView("grid");}}>← All Albums</button>
            <div>
              <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"18px",color:T.gold}}>{vLabel}</div>
              <div style={{fontSize:"11px",color:T.sub}}>{allPhotos.length} photo{allPhotos.length!==1?"s":""} · {viewing.journal.length} journal entries</div>
            </div>
          </div>

          {/* View tabs */}
          <div style={{display:"flex",gap:"3px",marginBottom:"20px",borderBottom:`1px solid ${T.bdr}`,paddingBottom:"12px"}}>
            {[["grid","🖼️ Photos"],["journal","✍️ Journal"],["memoir","★ Memoir History"]].map(([v,l])=>(
              <button key={v} onClick={()=>{setView(v);setAlbumView(v);}} style={{...BG,background:view===v?T.ocn:"transparent",color:view===v?"#fff":T.sub,borderColor:view===v?T.ocn:T.bdr}}>
                {l}
              </button>
            ))}
            {/* Jump to active trip journal */}
            {viewing.id===trip.id&&<button style={{...BS,marginLeft:"auto"}} onClick={()=>go("journal")}>Open Journal →</button>}
            {viewing.id!==trip.id&&<button style={{...BS,marginLeft:"auto"}} onClick={()=>{setAid(viewing.id);setAlbumTrip(viewing.id);go("albums");}}>Switch to This Corso</button>}
          </div>

          {/* PHOTO GRID */}
          {view==="grid"&&(
            allPhotos.length>0 ? (
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"8px"}}>
                  {allPhotos.map((p,i)=>(
                    <div key={i} style={{position:"relative",cursor:"pointer"}} onClick={()=>setLightbox(p)}>
                      <img src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"8px",border:`1px solid ${T.bdr}`,display:"block"}} alt=""/>
                      {p.dayRef&&<div style={{position:"absolute",bottom:"4px",left:"5px",background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:"9px",padding:"1px 5px",borderRadius:"4px"}}>Day {p.dayRef}</div>}
                    </div>
                  ))}
                </div>
                <div style={{marginTop:"16px",fontSize:"12px",color:T.fnt,textAlign:"center"}}>Tap any photo to enlarge · Photos are saved in your backup export</div>
              </div>
            ) : <div style={{textAlign:"center",padding:"48px",color:T.sub}}>No photos in this album yet. Add photos from the Journal tab.</div>
          )}

          {/* JOURNAL VIEW */}
          {view==="journal"&&(
            viewing.journal.length>0 ? (
              <div>
                {viewing.journal.map((e,i)=>{
                  const ePhotos=(e.photoIds||[]).map(pid=>viewing.photos.find(p=>p.id===pid)).filter(Boolean);
                  return (
                    <div key={i} style={{...CD,cursor:"default",marginBottom:"14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                        <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.gold}}>Day {e.day} · {e.date}</div>
                        {ePhotos.length>0&&<span style={{fontSize:"10px",color:T.sub}}>{ePhotos.length} photo{ePhotos.length!==1?"s":""}</span>}
                      </div>
                      {e.good&&<div style={{fontSize:"14px",color:T.tx,marginBottom:"6px"}}><span style={{color:T.ocn}}>✦</span> {e.good}</div>}
                      {e.bad&&<div style={{fontSize:"14px",color:T.tx,marginBottom:"6px"}}><span style={{color:"#e05555"}}>◦</span> {e.bad}</div>}
                      {e.highlight&&<div style={{fontSize:"14px",color:T.tx,marginBottom:"10px"}}><span style={{color:T.gold}}>★</span> {e.highlight}</div>}
                      {ePhotos.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:"5px"}}>
                        {ePhotos.map((p,pi)=>(
                          <img key={pi} src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"6px",cursor:"pointer",border:`1px solid ${T.bdr}`}} alt="" onClick={()=>setLightbox(p)}/>
                        ))}
                      </div>}
                    </div>
                  );
                })}
              </div>
            ) : <div style={{textAlign:"center",padding:"48px",color:T.sub}}>No journal entries yet.</div>
          )}

          {/* MEMOIR HISTORY */}
          {view==="memoir"&&(
            <div>
              {viewing.memoirHistory?.length>0 ? (
                <div>
                  <div style={{fontSize:"12px",color:T.sub,marginBottom:"16px"}}>{viewing.memoirHistory.length} memoir{viewing.memoirHistory.length!==1?"s":""} generated for this trip</div>
                  {[...viewing.memoirHistory].reverse().map((m,i)=>(
                    <div key={i} style={{...CD,marginBottom:"14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                        <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"13px",color:T.gold}}>Memoir #{viewing.memoirHistory.length-i}</div>
                        <div style={{fontSize:"10px",color:T.fnt}}>{fmtD(m.generatedAt)} · {fmtT(m.generatedAt,h24)}</div>
                      </div>
                      <div style={{fontSize:"14px",lineHeight:"1.85",color:T.tx,whiteSpace:"pre-line"}}>{m.text}</div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{textAlign:"center",padding:"48px"}}>
                  <div style={{fontSize:"14px",color:T.sub,marginBottom:"16px"}}>No memoirs generated yet for this trip.</div>
                  {viewing.id===trip.id&&<button style={BN} onClick={()=>go("memoir")}>Generate a Memoir →</button>}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── ALBUM LIST (all trips) ────────────────────────────────────────────────
    return (
      <div className="fade-in">
        <h1 style={H1}>Photo Albums</h1>
        <p style={H2}>Your journeys, captured</p>

        {tripsWithPhotos.length===0 ? (
          <div style={{textAlign:"center",padding:"60px",color:T.sub}}>
            <div style={{fontSize:"32px",marginBottom:"16px"}}>📷</div>
            <div style={{fontSize:"15px",marginBottom:"8px"}}>No photos yet</div>
            <div style={{fontSize:"13px",marginBottom:"20px"}}>Add photos to your journal entries and they'll appear here organized by trip</div>
            <button style={BN} onClick={()=>go("journal")}>Go to Journal →</button>
          </div>
        ) : (
          <div style={G2}>
            {trips.map(tr=>{
              const photos=tr.photos||[];
              const label=tr.tripName||(tr.dest?tr.dest.name:"Untitled Corso");
              const rating=RATINGS.find(r=>r.id===tr.rating);
              const cover=photos[0];
              return (
                <div key={tr.id} style={{...CC,padding:0,overflow:"hidden"}} onClick={()=>{setOpenTrip(tr.id);setAlbumTrip(tr.id);setView("grid");setAlbumView("grid");}}>
                  {/* Cover photo or placeholder */}
                  <div style={{aspectRatio:"16/9",background:dark?"#1a3a50":"#eaf3f8",position:"relative",overflow:"hidden"}}>
                    {cover ? (
                      <img src={cover.b64} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                    ) : (
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",fontSize:"40px"}}>{tr.dest?.img||"🧭"}</div>
                    )}
                    <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.6))"}}>
                      <div style={{position:"absolute",bottom:"10px",left:"12px",right:"12px"}}>
                        <div style={{fontFamily:"'Spectral',serif",fontSize:"16px",fontWeight:500,color:"#fff",marginBottom:"2px"}}>{label}</div>
                        <div style={{fontSize:"10px",color:"rgba(255,255,255,0.7)"}}>{photos.length} photo{photos.length!==1?"s":""} · {tr.journal.length} journal entries</div>
                      </div>
                    </div>
                    {tr.id===trip.id&&<div style={{position:"absolute",top:"8px",right:"8px",background:T.coral,color:"#fff",fontSize:"8px",padding:"2px 7px",borderRadius:"100px",fontWeight:700}}>Active</div>}
                    {rating&&<div style={{position:"absolute",top:"8px",left:"8px",background:rating.color+"cc",color:"#fff",fontSize:"9px",padding:"2px 7px",borderRadius:"100px",fontWeight:700}}>{rating.icon} {rating.label}</div>}
                  </div>
                  <div style={{padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      {tr.td.startDate&&<div style={{fontSize:"11px",color:T.sub}}>{fmtD(tr.td.startDate)}{tr.td.endDate?` – ${fmtD(tr.td.endDate)}`:""}</div>}
                      {tr.td.travelers.length>0&&<div style={{fontSize:"10px",color:T.fnt,marginTop:"2px"}}>{tr.td.travelers.join(", ")}</div>}
                    </div>
                    <div style={{display:"flex",gap:"6px"}}>
                      {tr.memoirHistory?.length>0&&<span style={{fontSize:"10px",color:T.gold}}>★ {tr.memoirHistory.length} memoir{tr.memoirHistory.length!==1?"s":""}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* All trips summary — even without photos */}
        {trips.filter(t=>!t.photos?.length).length>0&&tripsWithPhotos.length>0&&(
          <div style={{marginTop:"24px"}}>
            <div style={{fontSize:"10px",letterSpacing:"0.15em",textTransform:"uppercase",fontWeight:600,color:T.sub,marginBottom:"12px"}}>Trips without photos yet</div>
            {trips.filter(t=>!t.photos?.length).map(tr=>(
              <div key={tr.id} style={{...CD,display:"flex",alignItems:"center",gap:"12px",cursor:"pointer"}} onClick={()=>{setOpenTrip(tr.id);setAlbumTrip(tr.id);setView("journal");setAlbumView("journal");}}>
                <span style={{fontSize:"24px"}}>{tr.dest?.img||"🧭"}</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"14px",color:T.tx}}>{tr.tripName||tr.dest?.name||"Untitled Corso"}</div>
                  <div style={{fontSize:"11px",color:T.sub}}>{tr.journal.length} journal entries · {fmtD(tr.createdAt)}</div>
                </div>
                <span style={{fontSize:"12px",color:T.fnt}}>→</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // ══ SUMMARY ══════════════════════════════════════════════════════════════════
  const Memoir = () => {
    const entries=trip.journal;
    const rd=RATINGS.find(r=>r.id===(trip.rating||sugR));
    return (
      <div className="fade-in">
        <Banner/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px"}}>
          <h1 style={{...H1,marginBottom:0}}>Memoir</h1>
          <button style={BS} onClick={()=>{setSidebar(v=>!v);setViewId(null);}}>{sidebar?"Close ✕":"All Corsos ↗"}</button>
        </div>
        <p style={H2}>{tripLabel}</p>
        <div style={{...G2,marginBottom:"20px"}}>
          {[{lb:"Days Journaled",val:entries.length},{lb:"Photos Taken",val:trip.photos.length},{lb:"Good Memories",val:entries.filter(e=>e.good).length},{lb:"Challenges",val:entries.filter(e=>e.bad).length}].map(({lb,val})=>(
            <div key={lb} style={{background:T.crd,border:`1px solid ${T.bdr}`,borderRadius:"10px",padding:"17px",textAlign:"center"}}>
              <div style={{fontFamily:"'Spectral',serif",fontSize:"38px",fontWeight:300,color:T.gold,marginBottom:"3px"}}>{val}</div>
              <div style={{fontSize:"9px",color:T.sub,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:500}}>{lb}</div>
            </div>
          ))}
        </div>
        {trip.photos.length>0&&(
          <div style={{marginBottom:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <div style={LB}>Trip Photos</div>
              <button style={BG} onClick={()=>{setAlbumTrip(trip.id);setAlbumView("grid");go("albums");}}>View Full Album →</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:"6px"}}>
              {trip.photos.slice(0,8).map((p,i)=>(
                <img key={i} src={p.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"6px",cursor:"pointer",border:`1px solid ${T.bdr}`}} alt="" onClick={()=>setLightbox(p)}/>
              ))}
              {trip.photos.length>8&&<div style={{aspectRatio:"1",background:T.bg2,borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:T.sub,cursor:"pointer"}} onClick={()=>{setAlbumTrip(trip.id);setAlbumView("grid");go("albums");}}>+{trip.photos.length-8}</div>}
            </div>
          </div>
        )}
        <div style={{marginBottom:"17px"}}>
          <div style={LB}>Rate This Vacation</div>
          <div style={G2}>
            {RATINGS.map(r=>(
              <div key={r.id} style={{background:trip.rating===r.id?r.color+"14":T.crd,border:`1px solid ${trip.rating===r.id?r.color:T.bdr}`,borderRadius:"10px",padding:"14px",cursor:"pointer"}} onClick={()=>upTrip({rating:r.id})}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}}>
                  <span style={{fontSize:"17px",color:r.color}}>{r.icon}</span>
                  <span style={{color:r.color,fontSize:"13px",fontWeight:600}}>{r.label}</span>
                  {r.id===sugR&&<span style={{fontSize:"8px",color:T.fnt}}>suggested</span>}
                </div>
                <div style={{fontSize:"11px",color:T.sub}}>{r.desc}</div>
              </div>
            ))}
          </div>
        </div>
        {rd&&<div style={{...AB,borderColor:rd.color+"55",borderLeftColor:rd.color,marginBottom:"14px"}}>
          <div style={{fontFamily:"'Spectral',serif",fontStyle:"italic",fontSize:"16px",color:rd.color,marginBottom:"4px"}}>{rd.icon} {rd.label}</div>
          <div style={{color:T.sub}}>{rd.desc}</div>
        </div>}

        {/* Memoir — saved to history */}
        <div style={{marginBottom:"13px"}}>
          <button style={BS} onClick={()=>{
            const goods=entries.map(e=>e.good).filter(Boolean).join("; ");
            const bads=entries.map(e=>e.bad).filter(Boolean).join("; ");
            const highs=entries.map(e=>e.highlight).filter(Boolean).join("; ");
            const who=trip.td.travelers.length?`Traveling party: ${trip.td.travelers.join(", ")}.`:"";
            callAI(
              `I just returned from ${trip.dest?.name||"my trip"} — trip name: "${tripLabel}". ${who} Good memories: ${goods||"none"}. Challenges: ${bads||"none"}. Highlights: ${highs||"none"}. My rating: ${rd?.label}. Write a warm 2-paragraph memoir, then 3 suggestions if I return.`,
              (text)=>{
                // Save memoir to history
                const newMemoir = {text, generatedAt:new Date().toISOString()};
                upTrip({memoirHistory:[...(trip.memoirHistory||[]), newMemoir]});
              }
            );
          }}>★ Generate AI Memoir</button>
          {(trip.memoirHistory?.length>0)&&(
            <button style={{...BG,marginLeft:"8px"}} onClick={()=>{setAlbumTrip(trip.id);setAlbumView("memoir");go("albums");}}>
              View {trip.memoirHistory.length} Saved Memoir{trip.memoirHistory.length!==1?"s":""} →
            </button>
          )}
        </div>

        {busy&&<div style={{...AB,color:T.gold}}>Composing your memoir…</div>}
        {aiResp&&(
          <div style={AB}>
            <div style={{fontSize:"9px",color:T.gold,letterSpacing:"0.15em",marginBottom:"8px",fontWeight:600}}>★ {tripLabel.toUpperCase()} MEMOIR</div>
            <div style={{whiteSpace:"pre-line"}}>{aiResp}</div>
            <div style={{marginTop:"12px",fontSize:"11px",color:T.fnt}}>✓ Saved to memoir history</div>
          </div>
        )}
        <div style={DV}/>
        <div style={{textAlign:"center"}}>
          <button style={BS} onClick={()=>{const nt=mkTrip();setTrips(ts=>[...ts,nt]);setAid(nt.id);setAiResp(null);go("discover");}}>✦ Start Another Corso</button>
        </div>
      </div>
    );
  };

  const pages={about:About,discover:Discover,plan:Plan,pack:Pack,journal:Journal,albums:Albums,memoir:Memoir};
  const Page=pages[ph];

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.tx,fontFamily:"'DM Sans',sans-serif",transition:"background 0.3s,color 0.3s"}}>
      {/* HEADER */}
      <header className="noprint" style={{background:T.nav,borderBottom:`1px solid ${T.bdr}`,padding:"0 12px 0 18px",display:"flex",alignItems:"center",justifyContent:"space-between",height:"56px",position:"sticky",top:0,zIndex:100,boxShadow:dark?"none":"0 1px 8px rgba(0,0,0,0.05)"}}>
        {/* Logo — always visible */}
        <div style={{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer"}} onClick={()=>go("about")}>
          <Wave size={30} dark={dark}/>
          <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"18px",letterSpacing:"0.08em",color:dark?T.tx:T.dep}}>Corso</span>
        </div>
        {/* Desktop nav — hidden on mobile via CSS */}
        <nav className="desktop-nav" style={{display:"flex",gap:"2px"}}>
          {PHASES.map(p=>(
            <button key={p} onClick={()=>go(p)} style={{padding:"5px 8px",background:ph===p?T.coral:"transparent",color:ph===p?"#fff":T.sub,border:`1px solid ${ph===p?T.coral:T.bdr}`,borderRadius:"6px",cursor:"pointer",fontSize:"9px",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:500,WebkitTapHighlightColor:"transparent"}}>
              {NAV_LABELS[p]}
            </button>
          ))}
        </nav>
        {/* Desktop utils */}
        <div className="desktop-header-utils" style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <SaveInd/>
          <button style={BG} onClick={doExport}>↓ Export</button>
          <label style={{...BG,display:"inline-flex",alignItems:"center",cursor:"pointer"}}>↑ Import<input type="file" accept=".json" style={{display:"none"}} ref={impRef} onChange={doImport}/></label>
          <button style={{...BG,background:h24?(dark?"#1e3448":"#eaf3f8"):"transparent",color:h24?T.ocn:T.sub,borderColor:h24?T.ocn:T.bdr}} onClick={()=>setH24(v=>!v)}>{h24?"24h":"12h"}</button>
          <button style={BG} onClick={()=>setDark(v=>!v)}>{dark?"☀️":"🌙"}</button>
        </div>
        {/* Mobile right side — save indicator + settings */}
        <div className="mobile-header-title" style={{display:"none",alignItems:"center",gap:"8px"}}>
          <SaveInd/>
          <button style={{...BG,padding:"6px 10px"}} onClick={()=>setMobileSettings(v=>!v)}>⚙️</button>
        </div>
      </header>
      {/* Mobile settings drawer */}
      {mobileSettings&&(
        <div className="noprint" style={{position:"fixed",top:"56px",left:0,right:0,zIndex:150,background:T.nav,borderBottom:`1px solid ${T.bdr}`,padding:"12px 16px",display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center",boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}}>
          <button style={BG} onClick={()=>{doExport();setMobileSettings(false);}}>↓ Export Backup</button>
          <label style={{...BG,display:"inline-flex",alignItems:"center",cursor:"pointer"}}>↑ Import Backup<input type="file" accept=".json" style={{display:"none"}} ref={impRef} onChange={e=>{doImport(e);setMobileSettings(false);}}/></label>
          <button style={{...BG,background:dark?(dark?"#1e3448":"#eaf3f8"):"transparent",color:dark?T.ocn:T.sub}} onClick={()=>{setDark(v=>!v);}}>{dark?"☀️ Light Mode":"🌙 Dark Mode"}</button>
          <button style={{...BG,background:h24?(dark?"#1e3448":"#eaf3f8"):"transparent",color:h24?T.ocn:T.sub}} onClick={()=>setH24(v=>!v)}>{h24?"24h":"12h"}</button>
          <button style={{...BG,marginLeft:"auto"}} onClick={()=>setMobileSettings(false)}>✕ Close</button>
        </div>
      )}

      {/* MAIN */}
      <div style={{position:"relative"}}>
        <main className="main-pad" style={{padding:"28px 18px",maxWidth:"960px",margin:"0 auto",paddingRight:sidebar?"300px":"18px"}}>
          <Page/>
        </main>
        {sidebar&&<Sidebar/>}
      </div>
      {/* BOTTOM TAB BAR — mobile only */}
      <nav className="bottom-tab-bar noprint" style={{background:T.nav,borderTop:`1px solid ${T.bdr}`,boxShadow:"0 -2px 16px rgba(0,0,0,0.08)"}}>
        {[
          {p:"discover",ic:"🧭",lb:"Discover"},
          {p:"plan",ic:"📋",lb:"Plan"},
          {p:"pack",ic:"🎒",lb:"Pack"},
          {p:"journal",ic:"✍️",lb:"Journal"},
          {p:"albums",ic:"🖼️",lb:"Albums"},
          {p:"memoir",ic:"⭐",lb:"Memoir"},
        ].map(({p,ic,lb})=>{
          const active=ph===p;
          return (
            <button key={p} onClick={()=>go(p)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"3px",padding:"8px 2px 6px",background:"transparent",border:"none",cursor:"pointer",WebkitTapHighlightColor:"transparent",position:"relative"}}>
              {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:"28px",height:"2.5px",background:T.coral,borderRadius:"0 0 3px 3px"}}/>}
              <span style={{fontSize:"20px",lineHeight:1}}>{ic}</span>
              <span style={{fontSize:"9px",fontWeight:active?700:400,color:active?T.coral:T.sub,letterSpacing:"0.04em",textTransform:"uppercase"}}>{lb}</span>
            </button>
          );
        })}
      </nav>

      {/* LIGHTBOX */}
      {lightbox&&<Lightbox photo={lightbox} onClose={()=>setLightbox(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
